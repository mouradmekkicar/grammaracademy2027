<!-- ====================================================================
     STEP 4 · DISPLAY PATCHES  (academic-year normalisation)
     Forces every academic-year label to one canonical value, regardless
     of what each data module declares. Runs after the engine has
     registered all modules, then repaints once so corrected labels show.
     ==================================================================== -->
<script>
(function () {
  "use strict";
  var GA = window.GA; if (!GA || !GA.registry) return;
  var AY = "2026\u20132027"; // single canonical academic year (en dash)
  function normAY(s) {
    if (!s) return s; s = String(s);
    s = s.replace(/((?:AY|Academic\s*Year)\s*)20\d{2}\s*[\u2013\u2014\-]\s*(?:20)?\d{2,4}/gi, "$1" + AY);
    s = s.replace(/\b20\d{2}\s*[\u2013\u2014\-]\s*(?:20)?\d{2,4}\b/g, AY);
    return s;
  }
  // Normalise stored labels so every direct read (term cards, crumbs, tables) matches.
  try {
    Object.keys(GA.registry.pathways).forEach(function (k) {
      var p = GA.registry.pathways[k]; if (p && p.termLabel) p.termLabel = normAY(p.termLabel);
    });
    Object.keys(GA.registry.terms).forEach(function (t) {
      var T = GA.registry.terms[t]; if (T && T.label) T.label = normAY(T.label);
    });
  } catch (e) {}
  // Override metadata helpers (shared object → internal callers pick these up).
  if (GA._meta) {
    GA._meta.ayPhrase = function () { return AY; };
    var _tp = GA._meta.termPhrase;
    GA._meta.termPhrase = function (pw) { return normAY(_tp ? _tp(pw) : (pw && pw.termLabel) || ""); };
  }
  // Repaint so the first painted view reflects the corrected labels.
  try { if (typeof GA.go === "function") GA.go(location.hash || "#entrance"); } catch (e) {}
})();
</script>
<!-- ====================================================================
     STEP 5 · PREMIUM FX ENGINE  (additive · runs after the engine boots)
     Owns sound + visual feedback only. It never alters learning content,
     validation, progress, reports, certificates or worksheet printing —
     it wraps the existing public GA._* entry points and listens via
     delegation, so every effect is bolted on, never woven in.
     ==================================================================== -->
<script>
(function () {
  "use strict";
  var GA = window.GA = window.GA || {};
  var LS_KEY = "mm_ga_fx_sound";
  function reduced() {
    try { return !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches); }
    catch (e) { return false; }
  }

  function prefEnabled() { try { var v = localStorage.getItem(LS_KEY); return v === null ? true : v === "1"; } catch (e) { return true; } }
  function savePref(on) { try { localStorage.setItem(LS_KEY, on ? "1" : "0"); } catch (e) {} }

  function fxLayer() { return document.getElementById("fxLayer"); }

  /* ---------- Sound (Web Audio · synthesised, no external files) -------- */
  var FX = {
    enabled: prefEnabled(),
    volume: 0.35,
    ctx: null,
    _unlocked: false,
    _lastHover: 0,
    _lastTick: 0,

    _ac: function () {
      if (this.ctx) return this.ctx;
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        this.ctx = new AC();
      } catch (e) { this.ctx = null; }
      return this.ctx;
    },

    // Resume / create the context on the first user gesture (autoplay policy).
    unlock: function () {
      var ctx = this._ac(); if (!ctx) return;
      if (ctx.state === "suspended" && ctx.resume) { try { ctx.resume(); } catch (e) {} }
      this._unlocked = true;
    },

    _note: function (freq, t0, dur, type, peak, glideTo) {
      var ctx = this.ctx; if (!ctx) return;
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type || "sine";
      o.frequency.setValueAtTime(freq, t0);
      if (glideTo) { try { o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur); } catch (e) {} }
      var vol = Math.max(0.0001, peak * this.volume);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t0); o.stop(t0 + dur + 0.02);
    },

    play: function (type) {
      if (!this.enabled) return;
      var ctx = this._ac(); if (!ctx) return;
      if (ctx.state === "suspended") { try { ctx.resume(); } catch (e) {} }
      if (ctx.state !== "running") return; // still locked → stay silent, no error
      var t = ctx.currentTime, n = this._note.bind(this);
      switch (type) {
        case "click":   n(660, t, 0.06, "triangle", 0.16); break;
        case "tick":    n(880, t, 0.035, "sine", 0.07); break;
        case "nav":     n(520, t, 0.13, "sine", 0.12, 720); break;
        case "hover":   n(1040, t, 0.03, "sine", 0.05); break;
        case "correct": n(659.3, t, 0.10, "sine", 0.18); n(987.8, t + 0.085, 0.14, "sine", 0.16); break;
        case "wrong":   n(300, t, 0.10, "sine", 0.14, 196); n(180, t + 0.02, 0.16, "triangle", 0.07); break;
        case "complete":n(523.3, t, 0.09, "sine", 0.16); n(659.3, t + 0.075, 0.09, "sine", 0.16); n(784, t + 0.15, 0.16, "sine", 0.17); break;
        case "submit":  n(440, t, 0.12, "sine", 0.16); n(587.3, t + 0.10, 0.20, "sine", 0.16); break;
        case "badge":   n(784, t, 0.09, "sine", 0.16); n(1046.5, t + 0.08, 0.12, "sine", 0.15); n(1568, t + 0.17, 0.10, "sine", 0.10); break;
        case "certificate":
          n(523.3, t, 0.10, "sine", 0.17); n(659.3, t + 0.09, 0.10, "sine", 0.17);
          n(784, t + 0.18, 0.10, "sine", 0.17); n(1046.5, t + 0.27, 0.14, "sine", 0.18);
          n(1318.5, t + 0.40, 0.22, "sine", 0.14); break;
        case "report":  n(587.3, t, 0.10, "sine", 0.14); n(440, t + 0.09, 0.16, "sine", 0.12); break;
        case "warn":    n(330, t, 0.09, "sine", 0.13); n(330, t + 0.14, 0.12, "sine", 0.11); break;
        default:        n(660, t, 0.06, "triangle", 0.14);
      }
    },

    // throttled cues for very frequent events (hover / option select)
    hoverTick: function () { var now = Date.now(); if (now - this._lastHover < 170) return; this._lastHover = now; this.play("hover"); },
    selectTick: function () { var now = Date.now(); if (now - this._lastTick < 60) return; this._lastTick = now; this.play("tick"); },

    /* ---------- Visual helpers ---------- */
    press: function (el) {
      if (!el) return;
      el.classList.add("fx-press");
      setTimeout(function () { el.classList.remove("fx-press"); }, 120);
    },

    visual: function (target, name) {
      if (!target || !name) return;
      var cls = "fx-" + name;
      target.classList.remove(cls);
      // force reflow so the animation can replay on rapid re-trigger
      void target.offsetWidth; // eslint-disable-line no-unused-expressions
      target.classList.add(cls);
      var clear = function () { target.classList.remove(cls); target.removeEventListener("animationend", clear); };
      target.addEventListener("animationend", clear);
      setTimeout(clear, 1300);
    },

    _spawn: function (x, y, cls, w, h, bg, dx, dy, rot, dur) {
      var layer = fxLayer(); if (!layer) return;
      var p = document.createElement("div");
      p.className = "fx-particle " + cls;
      p.style.left = x + "px"; p.style.top = y + "px";
      p.style.width = w + "px"; p.style.height = h + "px"; p.style.background = bg;
      p.style.setProperty("--fx-x1", dx + "px");
      p.style.setProperty("--fx-y1", dy + "px");
      if (rot != null) p.style.setProperty("--fx-rot", rot + "deg");
      if (dur != null) p.style.setProperty("--fx-dur", dur + "s");
      layer.appendChild(p);
      var done = function () { if (p.parentNode) p.parentNode.removeChild(p); p.removeEventListener("animationend", done); };
      p.addEventListener("animationend", done);
      setTimeout(done, (dur ? dur * 1000 : 1500) + 200);
    },

    // Small celebratory burst centred on a screen point (card-local feel).
    confettiAt: function (cx, cy, opts) {
      if (reduced() || !this.enabled && false) { /* confetti is visual-only, not gated by sound */ }
      if (reduced()) return;
      opts = opts || {};
      var n = opts.count || 16;
      var palette = opts.palette || ["#c89a3c", "#d9b565", "#3f9d69", "#4f8fdb", "#e8cf9a"];
      var spread = opts.spread || 120, rise = opts.rise || 150;
      for (var i = 0; i < n; i++) {
        var ang = (Math.random() - 0.5) * Math.PI * 0.9;
        var dist = spread * (0.4 + Math.random() * 0.9);
        var dx = Math.sin(ang) * dist;
        var dy = -rise * (0.3 + Math.random()) + Math.random() * 40;
        var sz = 5 + Math.random() * 6;
        var col = palette[(Math.random() * palette.length) | 0];
        var rot = (Math.random() * 720 - 360) | 0;
        var dur = 1.1 + Math.random() * 0.6;
        this._spawn(cx, cy, "fx-confetti-piece", sz, sz * (0.5 + Math.random()), col, dx, dy, rot, dur);
      }
    },

    // Confetti anchored to an element's box (uses screen coords → no layout shift).
    confetti: function (target, opts) {
      if (reduced() || !target) return;
      var r = target.getBoundingClientRect();
      this.confettiAt(r.left + r.width / 2, r.top + Math.min(r.height * 0.4, 60), opts);
    },

    // Full-width gold celebration (certificate unlock).
    burst: function (opts) {
      if (reduced()) return;
      opts = opts || {};
      var W = window.innerWidth, layer = fxLayer(); if (!layer) return;
      var n = opts.count || 30;
      var palette = opts.palette || ["#c89a3c", "#d9b565", "#e8cf9a", "#a78237", "#f6ecd3"];
      for (var i = 0; i < n; i++) {
        var x = W * (0.2 + Math.random() * 0.6);
        var y = -10 - Math.random() * 30;
        var dx = (Math.random() - 0.5) * 160;
        var dy = window.innerHeight * (0.55 + Math.random() * 0.4);
        var sz = 6 + Math.random() * 7;
        var col = palette[(Math.random() * palette.length) | 0];
        var rot = (Math.random() * 900 - 450) | 0;
        var dur = 1.5 + Math.random() * 0.8;
        this._spawn(x, y, "fx-confetti-piece", sz, sz * (0.45 + Math.random()), col, dx, dy, rot, dur);
      }
    },

    // Twinkle ring around an element (badges / honours).
    sparkle: function (target, opts) {
      if (reduced() || !target) return;
      opts = opts || {};
      var r = target.getBoundingClientRect();
      var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      var n = opts.count || 7, rad = opts.radius || (Math.max(r.width, r.height) * 0.55 + 8);
      var palette = opts.palette || ["#e8cf9a", "#d9b565", "#ffffff", "#c89a3c"];
      for (var i = 0; i < n; i++) {
        var a = (Math.PI * 2 * i) / n + Math.random() * 0.5;
        var dx = Math.cos(a) * rad, dy = Math.sin(a) * rad;
        var sz = 4 + Math.random() * 4;
        var col = palette[(Math.random() * palette.length) | 0];
        this._spawn(cx, cy, "fx-spark", sz, sz, col, dx, dy, null, 0.6 + Math.random() * 0.3);
      }
    }
  };
  GA.fx = FX;

  /* ---------- Toggle wiring ---------- */
  function syncToggle(btn) {
    if (!btn) return;
    var on = FX.enabled;
    btn.setAttribute("aria-pressed", on ? "true" : "false");
    btn.setAttribute("aria-label", on ? "Sound effects on" : "Sound effects off");
    btn.title = on ? "Sound effects: on" : "Sound effects: off";
  }
  function initToggle() {
    var btn = document.getElementById("soundToggle");
    if (!btn) return;
    syncToggle(btn);
    btn.addEventListener("click", function () {
      FX.enabled = !FX.enabled;
      savePref(FX.enabled);
      syncToggle(btn);
      if (FX.enabled) { FX.unlock(); FX.play("click"); }
    });
  }

  /* ---------- First-gesture unlock ---------- */
  function armUnlock() {
    var fire = function () { FX.unlock(); remove(); };
    var remove = function () {
      ["pointerdown", "keydown", "touchstart"].forEach(function (ev) {
        window.removeEventListener(ev, fire, true);
      });
    };
    ["pointerdown", "keydown", "touchstart"].forEach(function (ev) {
      window.addEventListener(ev, fire, true);
    });
  }

  /* ---------- Delegated micro-interactions ---------- */
  function delegate() {
    // Clicks: sound + tactile press, routed by element/onclick so nothing double-fires.
    document.addEventListener("click", function (e) {
      var t = e.target; if (!t || !t.closest) return;
      if (t.closest(".sound-toggle")) return;

      var lock = t.closest(".banner.lock");
      if (lock) { FX.play("warn"); FX.visual(lock, "shake"); return; }

      var mcq = t.closest(".mcq-item");
      if (mcq) { if (!mcq.closest(".exercise.done")) { FX.selectTick(); FX.visual(mcq, "pop"); } return; }

      var chip = t.closest(".chip");
      if (chip) { FX.selectTick(); return; }

      var btn = t.closest(".btn");
      if (btn) {
        FX.press(btn);
        if (btn.disabled || btn.getAttribute("aria-disabled") === "true") { FX.play("warn"); return; }
        var oc = btn.getAttribute("onclick") || "";
        if (/_submitOfficial|_checkPractice/.test(oc)) return;            // handled in wrappers
        if (/_printReport|_batchReports|_openReport|_doPrint/.test(oc)) { FX.play("report"); return; }
        if (/_printCert/.test(oc)) { FX.play("report"); return; }
        if (/_setTerm|_setStream|_openLesson|GA\.go|_continueJourney|_exploreLesson|_resumeLesson/.test(oc)) { FX.play("nav"); return; }
        FX.play("click");
        return;
      }

      // Pathway / term cards are keyboard-activatable role="button" elements.
      var card = t.closest(".card.lift");
      if (card) { FX.play("nav"); return; }
    }, false);

    // Hover cue — pointer devices only, heavily throttled, lesson/pathway cards only.
    document.addEventListener("pointerover", function (e) {
      if (e.pointerType === "touch") return;
      var t = e.target; if (!t || !t.closest) return;
      if (t.closest(".card.lift")) FX.hoverTick();
    }, false);
  }

  /* ---------- Grading feedback (wraps the two public check actions) ---------- */
  function paintGradeFeedback(isOfficial) {
    var host = document.getElementById("bankHost"); if (!host) return;
    if (isOfficial && !host.querySelector(".banner.lock")) return; // submission was cancelled
    var nodes = host.querySelectorAll(".exercise.done");
    if (!nodes.length) return;
    var correct = 0, total = nodes.length, ci = 0, wi = 0;
    nodes.forEach(function (node) {
      var ok = node.classList.contains("correct");
      if (ok) {
        correct++;
        (function (el, d) { setTimeout(function () { FX.visual(el, "success-pulse"); }, d); })(node, Math.min(ci++ * 45, 360));
      } else {
        (function (el, d) { setTimeout(function () { FX.visual(el, "error-pulse"); FX.visual(el, "shake"); }, d); })(node, Math.min(wi++ * 45, 360));
      }
    });
    var pct = total ? Math.round(correct / total * 100) : 0;

    if (isOfficial) {
      FX.play("submit");
      if (pct >= 70) { FX.visual(host, "glow-gold"); FX.confetti(host, { count: 18 }); }
    } else {
      if (pct >= 80) { FX.play("complete"); FX.visual(host, "glow-gold"); FX.confetti(host, { count: 16 }); }
      else if (correct > 0) { FX.play("correct"); }
      else { FX.play("wrong"); }
    }
  }
  function wrap(name, after) {
    var orig = GA[name];
    if (typeof orig !== "function") return;
    GA[name] = function () {
      var r = orig.apply(this, arguments);
      try { after.apply(this, arguments); } catch (e) {}
      return r;
    };
  }
  wrap("_checkPractice", function () { paintGradeFeedback(false); });
  wrap("_submitOfficial", function () { paintGradeFeedback(true); });

  // Sign-in / teacher gate warnings (no validation logic touched — only cues).
  wrap("_enter", function () {
    var s = document.getElementById("snum");
    if (s && !/^\d{2,}$/.test((s.value || "").trim())) { FX.play("warn"); FX.visual(s, "shake"); }
  });
  wrap("_teacherAuth", function () {
    // failure path re-renders the gate (its #tcode field reappears)
    if (document.getElementById("tcode")) FX.play("warn");
  });

  /* ---------- View-entrance choreography (#view child swaps) ---------- */
  var certCelebrated = {};
  function countUp(node) {
    if (reduced()) return;
    var raw = (node.textContent || "").trim();
    var m = /^(-?\d[\d,]*)(.*)$/.exec(raw);
    if (!m) return;
    var target = parseInt(m[1].replace(/,/g, ""), 10);
    if (!isFinite(target) || target <= 0) return;
    var suffix = m[2] || "", dur = 720, t0 = performance.now();
    node.textContent = "0" + suffix;
    function step(t) {
      var p = Math.min(1, (t - t0) / dur), e = p * (2 - p); // easeOutQuad
      var v = p >= 1 ? target : Math.round(target * e);
      node.textContent = v + suffix;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function growBars(scope) {
    if (reduced()) return;
    scope.querySelectorAll(".badge-prog > i").forEach(function (bar) {
      var w = bar.style.width;
      if (!w || w === "0%" || w === "0") return;
      bar.style.setProperty("--fx-target", w);
      bar.style.width = "0%";
      bar.classList.add("fx-bar-grow");
      var done = function () { bar.classList.remove("fx-bar-grow"); bar.style.width = w; bar.removeEventListener("animationend", done); };
      bar.addEventListener("animationend", done);
      setTimeout(done, 1200);
    });
  }
  function onViewEnter(root) {
    var page = root.querySelector(".page") || root.firstElementChild;
    if (page && page.classList) {
      page.classList.add("fx-view-enter");
      setTimeout(function () { page.classList.remove("fx-view-enter"); }, 900);
    }

    // Animated progress + stat count-ups (dashboard / report on screen).
    growBars(root);
    root.querySelectorAll(".stat-value").forEach(countUp);

    // Certificate unlock — celebrate once per pathway per session.
    var cert = root.querySelector(".cert-sheet");
    if (cert) {
      var key = (location.hash || "") + "|" + (cert.querySelector(".cert-name") ? cert.querySelector(".cert-name").textContent : "");
      if (!certCelebrated[key]) {
        certCelebrated[key] = true;
        FX.play("certificate");
        FX.visual(cert, "glow-gold");
        FX.burst({ count: 32 });
        setTimeout(function () { FX.burst({ count: 16 }); }, 650);
      }
    }

    // Report sheet generated.
    if (root.querySelector(".report-sheet")) {
      FX.play("report");
      var first = root.querySelector(".report-sheet");
      if (first) FX.visual(first, "glow-gold");
    }

    // Honour cabinet — shine + sparkle earned badges; chime only when the count rose.
    var grid = root.querySelector(".badge-grid");
    if (grid) {
      var earnedEls = grid.querySelectorAll(".badge-item.earned");
      var k = "mm_ga_fx_badges_" + (location.hash || "");
      var prev = 0; try { prev = parseInt(localStorage.getItem(k) || "0", 10) || 0; } catch (e) {}
      var now = earnedEls.length;
      if (!reduced()) {
        earnedEls.forEach(function (el, idx) {
          setTimeout(function () {
            el.classList.add("fx-shine");
            setTimeout(function () { el.classList.remove("fx-shine"); }, 1000);
            FX.sparkle(el, { count: 6 });
          }, Math.min(idx * 110, 700));
        });
      }
      if (now > prev) {
        FX.play("badge");
        if (!reduced() && earnedEls.length) {
          var last = earnedEls[earnedEls.length - 1];
          setTimeout(function () { FX.sparkle(last, { count: 10, radius: 46 }); FX.confetti(last, { count: 12 }); }, 260);
        }
      }
      try { localStorage.setItem(k, String(now)); } catch (e) {}
    }
  }
  function observeView() {
    var view = document.getElementById("view"); if (!view || !window.MutationObserver) return;
    var mo = new MutationObserver(function (muts) {
      for (var i = 0; i < muts.length; i++) {
        if (muts[i].addedNodes && muts[i].addedNodes.length) { onViewEnter(view); return; }
      }
    });
    mo.observe(view, { childList: true });
  }

  /* ---------- Boot ---------- */
  function boot() {
    initToggle();
    armUnlock();
    delegate();
    observeView();
    // Animate the very first painted view too (it rendered before this observer attached).
    onViewEnter(document.getElementById("view") || document.body);
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();

  console.log("[GA.fx] premium effects layer ready");
})();
</script>
<div id="lessonPrintMount"></div>
</body>
