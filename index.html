<style>
:root{
  --navy-900:#0e1b3a; --navy-800:#152447; --navy-700:#1e3260; --navy-600:#2a4478;
  --navy-500:#3a5a96; --navy-100:#e6ebf4; --navy-50:#f1f4fa;
  --gold-700:#8a6a20; --gold-600:#a78237; --gold-500:#c89a3c;
  --gold-400:#d9b565; --gold-300:#e8cf9a; --gold-100:#f6ecd3;
  --ivory:#faf6ee; --paper:#fdfaf3; --white:#fff;
  --ink:#15192a; --ink-soft:#3c4359; --muted:#6a7184;
  --line:#e5dfcd; --line-dark:#d7cfb4;
  --success:#2f6b46; --warn:#a66f1c; --error:#a4383a;
  --serif-display:'Cormorant Garamond','EB Garamond',Georgia,serif;
  --serif-body:'EB Garamond','Garamond','Baskerville',Georgia,serif;
  --sans-ui:'Inter','Helvetica Neue',system-ui,sans-serif;
  --ease:cubic-bezier(.2,.7,.2,1);
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px;
  --shadow-1:0 1px 2px rgba(14,27,58,.06),0 1px 3px rgba(14,27,58,.04);
  --shadow-2:0 6px 22px rgba(14,27,58,.08),0 2px 6px rgba(14,27,58,.05);
  --shadow-3:0 18px 48px rgba(14,27,58,.14),0 4px 14px rgba(14,27,58,.08);
  --shadow-gold:0 6px 22px rgba(200,154,60,.22);
  /* ---- Accent palette (semantic) ----
     sky = learning · teal = practice · amber = official assessment
     emerald = completion/success · violet = honours · coral = review/warning */
  --accent-sky:#4f8fdb;     --accent-sky-soft:#eaf2fb;
  --accent-teal:#39a6a3;    --accent-teal-soft:#e7f5f4;
  --accent-emerald:#3f9d69; --accent-emerald-soft:#e9f5ee;
  --accent-amber:#e2a53a;   --accent-amber-soft:#fbf2dd;
  --accent-violet:#7b68c7;  --accent-violet-soft:#efecf8;
  --accent-coral:#d96b63;   --accent-coral-soft:#fbeceb;
  /* ---- Spacing scale ---- */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  /* ---- Motion tokens ---- */
  --t-fast:.15s; --t-med:.25s; --t-slow:.45s;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--serif-body);font-size:17px;line-height:1.65;color:var(--ink);
  background:
    radial-gradient(1200px 600px at 10% -10%,rgba(200,154,60,.08),transparent 60%),
    radial-gradient(1200px 800px at 100% 0%,rgba(30,50,96,.05),transparent 55%),
    linear-gradient(180deg,var(--paper) 0%,var(--ivory) 100%);
  min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{font-family:var(--serif-display);color:var(--navy-900);margin:0;font-weight:600;letter-spacing:.2px}
h1{font-size:clamp(2rem,4vw,3rem);line-height:1.15}
h2{font-size:clamp(1.5rem,3vw,2rem);line-height:1.2}
h3{font-size:1.3rem;line-height:1.25}
h4{font-size:1.05rem;letter-spacing:.5px}
p{margin:0 0 .75em;color:var(--ink-soft)}
em{color:var(--navy-700);font-style:italic}
strong{color:var(--navy-900)}
code{font-family:var(--sans-ui);background:var(--navy-50);padding:1px 6px;border-radius:4px;font-size:.85em}

.app-shell{min-height:100vh;display:flex;flex-direction:column}

/* ===== Topbar ===== */
.topbar{position:sticky;top:0;z-index:80;
  background:linear-gradient(180deg,rgba(253,250,243,.96),rgba(250,246,238,.92));
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:20px}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer;border:none;background:transparent}
.brand-mark{width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,var(--gold-400),var(--gold-600) 60%,var(--gold-700));
  display:grid;place-items:center;color:var(--navy-900);
  font-family:var(--serif-display);font-weight:700;font-size:1.3rem;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.5),0 2px 8px rgba(138,106,32,.35);
  border:2px solid var(--navy-900)}
.brand-text{line-height:1.15;text-align:left}
.brand-name{font-family:var(--serif-display);font-weight:600;color:var(--navy-900);font-size:1.12rem;letter-spacing:.3px}
.brand-sub{font-family:var(--sans-ui);font-size:.68rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold-700)}
.nav{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.session-chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;
  border:1px solid var(--line-dark);border-radius:999px;
  font-family:var(--sans-ui);font-size:.76rem;background:var(--white);color:var(--ink-soft)}
.session-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.session-chip.teacher .dot{background:var(--navy-600)}

/* ===== Page ===== */
.page{max-width:1180px;margin:0 auto;padding:36px 28px 80px;width:100%}
.page.narrow{max-width:880px}
.page.ultra-narrow{max-width:560px}
.eyebrow{font-family:var(--sans-ui);font-size:.7rem;letter-spacing:2.4px;
  text-transform:uppercase;color:var(--gold-700);font-weight:600;
  margin-bottom:12px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:28px;height:1px;background:var(--gold-500)}
.section-sub{color:var(--ink-soft);max-width:640px;margin:6px 0 28px}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:12px 22px;font-family:var(--sans-ui);font-size:.8rem;
  letter-spacing:1.4px;text-transform:uppercase;font-weight:500;
  border:1px solid var(--navy-900);border-radius:var(--r-sm);
  cursor:pointer;transition:all .2s var(--ease);
  background:var(--navy-900);color:var(--ivory)}
.btn:hover{background:var(--navy-800);transform:translateY(-1px);box-shadow:var(--shadow-2)}
.btn.ghost{background:transparent;color:var(--navy-900)}
.btn.ghost:hover{background:var(--navy-50)}
.btn.gold{background:linear-gradient(180deg,var(--gold-500),var(--gold-600));
  border-color:var(--gold-700);color:var(--navy-900);box-shadow:var(--shadow-gold)}
.btn.gold:hover{background:linear-gradient(180deg,var(--gold-400),var(--gold-500))}
.btn.small{padding:8px 14px;font-size:.7rem}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== Cards / grids ===== */
.card{background:var(--white);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:26px;box-shadow:var(--shadow-1);
  transition:transform .25s var(--ease),box-shadow .25s var(--ease);position:relative}
.card.lift{cursor:pointer}
.card.lift:hover{transform:translateY(-4px);box-shadow:var(--shadow-3);border-color:var(--line-dark)}
.grid{display:grid;gap:18px}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}

.crumb{font-family:var(--sans-ui);font-size:.74rem;letter-spacing:1px;color:var(--muted);margin-bottom:18px;text-transform:uppercase}
.crumb a{cursor:pointer;color:var(--navy-700);border:none}
.crumb a:hover{color:var(--gold-700)}
.crumb .sep{margin:0 8px;color:var(--line-dark)}

.meta-row{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 0}
.tag{font-family:var(--sans-ui);font-size:.68rem;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;border:1px solid var(--line-dark);color:var(--ink-soft);background:var(--paper)}
.tag.code{color:var(--gold-700);border-color:var(--gold-300);background:var(--gold-100)}

.pill{font-family:var(--sans-ui);font-size:.66rem;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;font-weight:600;white-space:nowrap}
.pill.todo{background:var(--navy-50);color:var(--navy-600)}
.pill.practised{background:var(--gold-100);color:var(--gold-700)}
.pill.locked{background:#e9f1ec;color:var(--success)}

/* ===== Form ===== */
label.fld{display:block;font-family:var(--sans-ui);font-size:.72rem;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;font-weight:600}
input.txt{width:100%;font-family:var(--serif-body);font-size:1.15rem;padding:13px 16px;
  border:1px solid var(--line-dark);border-radius:var(--r-sm);background:var(--white);color:var(--ink);outline:none}
input.txt:focus{border-color:var(--gold-500);box-shadow:0 0 0 3px rgba(200,154,60,.15)}

/* ===== Lesson learn blocks ===== */
.learn-block{margin:0 0 22px}
.learn-h{font-family:var(--sans-ui);font-size:.72rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold-700);font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.learn-h .n{width:22px;height:22px;border-radius:50%;background:var(--navy-900);color:var(--ivory);
  display:grid;place-items:center;font-size:.7rem}
.ex-line{padding:9px 14px;border-left:3px solid var(--line-dark);margin-bottom:7px;background:var(--paper);border-radius:0 var(--r-sm) var(--r-sm) 0}
.ex-line.right{border-left-color:var(--success)}
.ex-line.wrong{border-left-color:var(--error);text-decoration:line-through;color:var(--muted)}
.list-clean{margin:0;padding-left:20px}.list-clean li{margin-bottom:6px;color:var(--ink-soft)}
.arabic{direction:rtl;text-align:right;font-size:1.12rem;background:var(--navy-50);
  border:1px solid var(--navy-100);border-radius:var(--r-md);padding:16px 18px;line-height:1.9}

/* ===== Tabs ===== */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin:8px 0 24px}
.tabs button{background:transparent;border:none;border-bottom:2px solid transparent;
  padding:12px 18px;font-family:var(--sans-ui);font-size:.8rem;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-1px}
.tabs button.active{color:var(--navy-900);border-bottom-color:var(--gold-500)}
.tabs button:hover:not(.active){color:var(--ink-soft)}

/* ===== Exercise ===== */
.exercise{background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);
  padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow-1)}
.exercise.correct{border-color:var(--success);background:#f4faf6}
.exercise.wrong{border-color:var(--error);background:#fcf5f5}
.ex-top{display:flex;gap:12px;align-items:baseline;margin-bottom:12px}
.ex-num{font-family:var(--serif-display);font-size:1.3rem;color:var(--gold-600);font-weight:700;min-width:24px}
.ex-prompt{font-size:1.06rem;color:var(--ink)}
.ex-type{font-family:var(--sans-ui);font-size:.6rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--line-dark);border-radius:4px;padding:2px 7px;margin-left:8px;vertical-align:middle}
.mcq-list{list-style:none;padding:0;margin:0;display:grid;gap:8px}
.mcq-item{padding:11px 16px;border:1px solid var(--line-dark);border-radius:var(--r-sm);cursor:pointer;
  background:var(--paper);transition:all .15s;display:flex;gap:12px;align-items:center}
.mcq-item:hover{border-color:var(--gold-500);background:var(--gold-100)}
.mcq-item.selected{border-color:var(--navy-600);background:var(--navy-50)}
.mcq-item.correct{border-color:var(--success);background:#e9f5ee}
.mcq-item.wrong{border-color:var(--error);background:#f9ebeb}
.mcq-item .bub{width:24px;height:24px;border-radius:50%;border:1px solid var(--line-dark);
  display:grid;place-items:center;font-family:var(--sans-ui);font-size:.78rem;flex:none}
.ans-input{width:100%;font-family:var(--serif-body);font-size:1.05rem;padding:10px 14px;
  border:1px solid var(--line-dark);border-radius:var(--r-sm);background:var(--white);outline:none}
.ans-input:focus{border-color:var(--gold-500)}
.given{padding:8px 14px;background:var(--navy-50);border-radius:var(--r-sm);margin-bottom:10px;font-style:italic}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{font-family:var(--sans-ui);font-size:.9rem;padding:7px 13px;border:1px solid var(--line-dark);
  border-radius:999px;background:var(--paper);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--gold-500);background:var(--gold-100)}
.drop{min-height:48px;border:1px dashed var(--line-dark);border-radius:var(--r-sm);padding:8px;
  display:flex;flex-wrap:wrap;gap:8px;background:var(--paper)}
.drop .chip{background:var(--navy-50);border-color:var(--navy-100)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:grid;gap:8px}
.match-item{padding:10px 13px;border:1px solid var(--line-dark);border-radius:var(--r-sm);background:var(--paper);cursor:pointer;transition:all .15s}
.match-item:hover{border-color:var(--gold-500)}
.match-item.sel{border-color:var(--navy-600);background:var(--navy-50)}
.match-item.paired{border-color:var(--success);background:#eef6f1}
.match-item .let{font-family:var(--sans-ui);font-weight:600;color:var(--gold-700);margin-right:8px}
.explain{margin-top:10px;font-size:.95rem;color:var(--ink-soft);border-top:1px dotted var(--line-dark);padding-top:8px}
.explain.show{display:block}.explain.hide{display:none}

/* ===== Banners ===== */
.banner{border-radius:var(--r-md);padding:18px 22px;margin-bottom:22px;font-family:var(--sans-ui);
  display:flex;gap:14px;align-items:center}
.banner.lock{background:#eef6f1;border:1px solid #cfe6d8;color:var(--success)}
.banner.warn{background:var(--gold-100);border:1px solid var(--gold-300);color:var(--gold-700)}
.banner .big{font-family:var(--serif-display);font-size:2rem;font-weight:700;line-height:1}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-style:italic}
.score-line{font-family:var(--sans-ui);font-size:.9rem;color:var(--ink-soft);margin-top:6px}

/* ===== Teacher peek ===== */
table.peek{width:100%;border-collapse:collapse;font-size:.95rem;background:var(--white)}
table.peek th,table.peek td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
table.peek th{font-family:var(--sans-ui);font-size:.7rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.foot{text-align:center;color:var(--muted);font-size:.82rem;padding:30px 0;font-family:var(--sans-ui);letter-spacing:.5px}
@media(max-width:560px){.match-grid{grid-template-columns:1fr}}

/* ===== Progress layer: dashboard + badges (ported from monolith) ===== */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);padding:22px;position:relative;overflow:hidden}
.stat-card .stat-label{font-family:var(--sans-ui);font-size:.7rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat-card .stat-value{font-family:var(--serif-display);font-size:2.4rem;color:var(--navy-900);font-weight:600;line-height:1;margin:8px 0 4px}
.stat-card .stat-sub{font-size:.85rem;color:var(--ink-soft)}
.stat-card .stat-accent{position:absolute;top:0;right:0;width:4px;height:100%;background:linear-gradient(180deg,var(--gold-500),var(--gold-400))}
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}
@media(max-width:960px){.dash-grid{grid-template-columns:1fr}}
.panel{background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);padding:24px;margin-bottom:20px}
.panel h3{margin-bottom:16px;display:flex;align-items:center;gap:10px}
.panel h3 .panel-dot{width:8px;height:8px;border-radius:50%;background:var(--gold-500)}
.mastery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.mastery-cell{padding:10px;border-radius:var(--r-sm);text-align:center;font-family:var(--sans-ui);font-size:.78rem;font-weight:500;border:1px solid var(--line);background:var(--paper)}
.mastery-cell .m-code{font-size:.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.mastery-cell .m-name{color:var(--navy-900);font-family:var(--serif-body);font-size:.88rem}
.mastery-cell .m-score{font-family:var(--serif-display);font-size:1.3rem;color:var(--navy-800);font-weight:600;margin-top:4px}
.mastery-cell.weak{background:#fcecec;border-color:#e5a6a7}
.mastery-cell.weak .m-score{color:var(--error)}
.mastery-cell.fair{background:#fbf0d7;border-color:var(--gold-300)}
.mastery-cell.fair .m-score{color:var(--warn)}
.mastery-cell.strong{background:#e8f2ec;border-color:#9fcaae}
.mastery-cell.strong .m-score{color:var(--success)}
.mastery-cell.untouched{opacity:.6}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px}
.badge-item{text-align:center;padding:16px 10px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--paper);transition:all .25s;opacity:.45;filter:grayscale(100%)}
.badge-item.earned{opacity:1;filter:none;background:linear-gradient(180deg,var(--white),var(--gold-100));border-color:var(--gold-400);box-shadow:var(--shadow-gold)}
.badge-medal{width:56px;height:56px;margin:0 auto 8px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif-display);font-size:1.4rem;font-weight:700;color:var(--navy-900)}
.badge-medal.bronze{background:radial-gradient(circle at 35% 30%,#d9a682,#b07048);border:3px solid #8a5434}
.badge-medal.silver{background:radial-gradient(circle at 35% 30%,#eaecef,#a8adb7);border:3px solid #7a808b}
.badge-medal.gold{background:radial-gradient(circle at 35% 30%,#f5d889,#c89a3c);border:3px solid #8a6a20}
.badge-medal.diamond{background:radial-gradient(circle at 35% 30%,#d9f0fa,#88b9d4);border:3px solid #3b6f90}
.badge-item h5{font-family:var(--serif-display);font-size:.98rem;margin:4px 0 2px;color:var(--navy-900)}
.badge-item .badge-req{font-family:var(--sans-ui);font-size:.7rem;color:var(--muted);letter-spacing:.5px}

/* ===== Teacher area (ported): roster, intervention, auth ===== */
.intervention-list{list-style:none;padding:0;margin:0}
.intervention-list li{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}
.intervention-list li:last-child{border-bottom:none}
.intervention-list .group-name{font-family:var(--serif-display);color:var(--navy-800);font-size:1.02rem}
.intervention-list .group-tags{font-family:var(--sans-ui);font-size:.78rem;color:var(--muted);margin-top:2px}
.intervention-list .group-count{background:var(--gold-100);border:1px solid var(--gold-300);padding:4px 10px;border-radius:999px;font-family:var(--sans-ui);font-size:.78rem;color:var(--gold-700);font-weight:600;white-space:nowrap}
.student-list{width:100%;border-collapse:collapse}
.student-list th,.student-list td{padding:10px 12px;text-align:left;font-family:var(--serif-body);border-bottom:1px solid var(--line);font-size:.94rem}
.student-list th{font-family:var(--sans-ui);font-size:.72rem;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:600}
.student-list tr:hover td{background:var(--paper)}
.student-list .pct-cell{font-family:var(--serif-display);color:var(--navy-800);font-weight:600}
.note-tag{font-family:var(--sans-ui);font-size:.78rem;color:var(--navy-700);cursor:pointer;border-bottom:1px dashed var(--line-dark)}
.note-tag.empty{color:var(--muted);font-style:italic;border-bottom-style:dotted}
.t-auth{max-width:420px;margin:30px auto;text-align:center}

/* ===== Reports (ported from monolith; school branding removed) ===== */
.report-tools{
  max-width:1040px;margin:0 auto 16px;display:flex;gap:10px;
  justify-content:space-between;align-items:center;flex-wrap:wrap;
}
.report-tools .tool-left{display:flex;gap:8px;flex-wrap:wrap}
.report-tools .tool-right{display:flex;gap:8px;flex-wrap:wrap}

.report-page{
  max-width:1040px;margin:0 auto;
}
.report-sheet{
  background:var(--paper);
  border:1px solid var(--line-dark);border-top:8px solid var(--navy-900);
  border-radius:var(--r-md);
  padding:42px 54px 48px;
  box-shadow:var(--shadow-2);
  position:relative;overflow:hidden;
  color:var(--ink);
  background-image:
    radial-gradient(circle at 0% 0%,rgba(200,154,60,.05),transparent 45%),
    radial-gradient(circle at 100% 100%,rgba(30,50,96,.03),transparent 40%);
}
.report-sheet + .report-sheet{margin-top:30px}

/* Decorative watermark — subtle diagonal text */
.report-sheet::before{
  content:"GRAMMAR ACADEMY · OFFICIAL REPORT";
  position:absolute;top:46%;left:50%;
  transform:translate(-50%,-50%) rotate(-28deg);
  font-family:var(--serif-display);font-size:3.6rem;font-weight:600;
  color:var(--gold-600);opacity:.04;letter-spacing:6px;
  pointer-events:none;white-space:nowrap;z-index:0;
}
.report-sheet > *{position:relative;z-index:1}

/* ===== Report header ===== */
.r-header{
  display:flex;align-items:center;gap:20px;
  padding-bottom:18px;margin-bottom:8px;
  border-bottom:1px solid var(--gold-400);
  position:relative;
}
.r-header::after{
  content:"";position:absolute;left:0;right:0;bottom:-4px;height:1px;
  background:var(--gold-400);opacity:.55;
}
.r-crest{
  width:72px;height:72px;border-radius:50%;flex:none;
  background:radial-gradient(circle at 30% 30%,var(--gold-300),var(--gold-600) 65%,var(--gold-700));
  border:3px double var(--navy-900);
  display:grid;place-items:center;color:var(--navy-900);
  font-family:var(--serif-display);font-size:1.9rem;font-weight:700;
  box-shadow:inset 0 2px 3px rgba(255,255,255,.4),0 2px 8px rgba(138,106,32,.3);
}
.r-title-block{flex:1;min-width:0}
.r-eyebrow{
  font-family:var(--sans-ui);font-size:.68rem;letter-spacing:3.4px;
  text-transform:uppercase;color:var(--gold-700);font-weight:700;
  margin-bottom:4px;
}
.r-title{
  font-family:var(--serif-display);font-size:2rem;color:var(--navy-900);
  font-weight:600;line-height:1.1;margin:0;
}
.r-subtitle{
  font-family:var(--serif-body);font-size:.98rem;color:var(--ink-soft);
  font-style:italic;margin-top:4px;
}
.r-date-col{
  text-align:right;font-family:var(--sans-ui);font-size:.74rem;
  color:var(--muted);letter-spacing:.3px;line-height:1.5;flex:none;
}
.r-date-col .r-date-val{
  font-family:var(--serif-display);font-size:1.02rem;color:var(--navy-800);
  font-weight:600;letter-spacing:.1px;
}

/* ===== Gold ornament divider ===== */
.r-ornament{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin:14px 0 22px;color:var(--gold-600);
}
.r-ornament::before,.r-ornament::after{
  content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-400),transparent);
}
.r-ornament .fleuron{
  font-family:var(--serif-display);font-size:1.05rem;
}

/* ===== Student info block ===== */
.r-student-info{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  background:var(--white);
  border:1px solid var(--line);border-radius:var(--r-sm);
  padding:14px 0;margin-bottom:24px;
}
.r-info-cell{
  padding:0 18px;border-right:1px solid var(--line);
  text-align:center;
}
.r-info-cell:last-child{border-right:none}
.r-info-cell .r-info-label{
  font-family:var(--sans-ui);font-size:.62rem;letter-spacing:1.8px;
  text-transform:uppercase;color:var(--muted);font-weight:600;
  margin-bottom:4px;
}
.r-info-cell .r-info-val{
  font-family:var(--serif-display);font-size:1.1rem;color:var(--navy-900);
  font-weight:600;line-height:1.2;word-wrap:break-word;
}
.r-info-cell .r-info-sub{
  font-family:var(--serif-body);font-size:.78rem;color:var(--muted);
  font-style:italic;margin-top:2px;
}

/* ===== Section pattern ===== */
.r-section{margin-bottom:22px}
.r-section-head{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:12px;padding-bottom:6px;
  border-bottom:1px solid var(--gold-300);
}
.r-section-head h3{
  font-family:var(--serif-display);font-size:1.18rem;color:var(--navy-900);
  font-weight:600;margin:0;letter-spacing:.2px;
}
.r-section-head .r-section-num{
  font-family:var(--sans-ui);font-size:.7rem;letter-spacing:1.8px;
  text-transform:uppercase;color:var(--gold-700);font-weight:600;
}

/* ===== Performance summary ===== */
.r-perf-grid{
  display:grid;grid-template-columns:1.1fr 2fr;gap:22px;align-items:stretch;
}
.r-score-tile{
  background:linear-gradient(165deg,var(--navy-900),var(--navy-700));
  color:var(--ivory);border-radius:var(--r-md);
  padding:22px 20px;text-align:center;position:relative;overflow:hidden;
}
.r-score-tile::after{
  content:"";position:absolute;top:-30%;left:-30%;width:160%;height:160%;
  background:radial-gradient(circle at 30% 30%,rgba(200,154,60,.18),transparent 55%);
  pointer-events:none;
}
.r-score-tile .r-score-label{
  font-family:var(--sans-ui);font-size:.66rem;letter-spacing:2.6px;
  text-transform:uppercase;color:var(--gold-300);font-weight:600;
  position:relative;z-index:1;
}
.r-score-tile .r-score-val{
  font-family:var(--serif-display);font-size:3.2rem;color:var(--ivory);
  font-weight:600;line-height:1;margin:6px 0 4px;
  position:relative;z-index:1;
}
.r-score-tile .r-score-band{
  font-family:var(--serif-display);font-size:1.05rem;
  font-weight:600;letter-spacing:.4px;
  display:inline-block;margin-top:6px;padding:4px 14px;
  border-radius:999px;border:1px solid rgba(255,255,255,.3);
  position:relative;z-index:1;
}
.r-score-tile .r-score-band.excellent{background:rgba(200,154,60,.22);color:var(--gold-300);border-color:var(--gold-500)}
.r-score-tile .r-score-band.strong{background:rgba(47,107,70,.25);color:#b9e4c8;border-color:#5b9e75}
.r-score-tile .r-score-band.developing{background:rgba(166,111,28,.25);color:#f2d49a;border-color:#caa064}
.r-score-tile .r-score-band.support{background:rgba(164,56,58,.22);color:#f0b4b5;border-color:#c06163}
.r-score-tile .r-score-foot{
  font-family:var(--serif-body);font-size:.8rem;color:rgba(250,246,238,.75);
  margin-top:10px;font-style:italic;position:relative;z-index:1;
}

.r-summary-text{
  background:var(--white);
  border:1px solid var(--line);border-left:3px solid var(--gold-500);
  border-radius:var(--r-sm);padding:16px 20px;
  font-family:var(--serif-body);font-size:.95rem;line-height:1.65;color:var(--ink-soft);
}
.r-summary-text strong{color:var(--navy-900)}

/* ===== Skills breakdown ===== */
.r-skills{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
.r-skill{
  display:grid;grid-template-columns:140px 1fr 46px;gap:12px;align-items:center;
  padding:6px 0;
}
.r-skill-name{
  font-family:var(--sans-ui);font-size:.82rem;color:var(--navy-800);
  font-weight:600;letter-spacing:.2px;
}
.r-skill-bar{
  height:10px;background:var(--navy-50);
  border-radius:999px;overflow:hidden;position:relative;
  border:1px solid var(--line);
}
.r-skill-bar-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--gold-500),var(--gold-400));
  transition:width .6s var(--ease);
}
.r-skill-bar-fill.excellent{background:linear-gradient(90deg,#3d8159,var(--success))}
.r-skill-bar-fill.strong{background:linear-gradient(90deg,var(--gold-500),var(--gold-400))}
.r-skill-bar-fill.developing{background:linear-gradient(90deg,#c79433,var(--warn))}
.r-skill-bar-fill.support{background:linear-gradient(90deg,#c06163,var(--error))}
.r-skill-val{
  font-family:var(--sans-ui);font-size:.84rem;color:var(--navy-900);
  font-weight:600;text-align:right;letter-spacing:.3px;
}
.r-skill-val.muted{color:var(--muted);font-weight:500}

/* ===== Outcomes (mastered / weak) ===== */
.r-outcomes{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.r-outcome-col{
  background:var(--white);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:14px 16px;
}
.r-outcome-col.mastered{border-left:3px solid var(--success)}
.r-outcome-col.weak{border-left:3px solid var(--warn)}
.r-outcome-col h4{
  font-family:var(--serif-display);font-size:1rem;color:var(--navy-900);
  margin:0 0 10px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.r-outcome-col.mastered h4 .tick{color:var(--success)}
.r-outcome-col.weak h4 .tick{color:var(--warn)}
.r-outcome-list{list-style:none;padding:0;margin:0}
.r-outcome-list li{
  display:flex;justify-content:space-between;align-items:baseline;gap:10px;
  padding:5px 0;border-bottom:1px dotted var(--line);
  font-family:var(--serif-body);font-size:.88rem;color:var(--ink-soft);
}
.r-outcome-list li:last-child{border-bottom:none}
.r-outcome-list li .ol-code{
  font-family:var(--sans-ui);font-size:.68rem;color:var(--muted);
  letter-spacing:.6px;flex:none;
}
.r-outcome-list li .ol-title{flex:1;color:var(--navy-800)}
.r-outcome-list li .ol-pct{
  font-family:var(--sans-ui);font-size:.78rem;font-weight:600;
  color:var(--navy-900);flex:none;letter-spacing:.2px;
}
.r-outcome-empty{
  font-family:var(--serif-body);font-style:italic;color:var(--muted);
  font-size:.85rem;margin:4px 0 0;
}

/* ===== Teacher comment ===== */
.r-comment{
  background:linear-gradient(180deg,var(--white),var(--paper));
  border:1px solid var(--line-dark);border-radius:var(--r-md);
  padding:18px 22px;position:relative;
}
.r-comment::before{
  content:"\201C";
  position:absolute;top:-6px;left:12px;
  font-family:var(--serif-display);font-size:3.2rem;color:var(--gold-400);
  line-height:1;
}
.r-comment-body{
  font-family:var(--serif-body);font-size:.96rem;line-height:1.75;
  color:var(--ink);padding-left:32px;margin:0;
}
.r-comment-body em{color:var(--navy-800);font-style:italic}

/* ===== Recommendations ===== */
.r-reco{
  background:var(--white);border:1px solid var(--line);
  border-left:3px solid var(--navy-700);
  border-radius:var(--r-sm);padding:12px 16px 12px 20px;
}
.r-reco ul{margin:0;padding-left:20px}
.r-reco li{
  font-family:var(--serif-body);font-size:.92rem;line-height:1.65;
  color:var(--ink-soft);margin-bottom:4px;
}
.r-reco li strong{color:var(--navy-900)}

/* Side-by-side Teacher Comment + Recommendations on desktop */
.r-comment-reco-row{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
.r-comment-reco-row .r-section-dual{margin-bottom:0}
@media(max-width:820px){
  .r-comment-reco-row{grid-template-columns:1fr}
}

/* ===== Badges row ===== */
.r-badges{
  display:flex;flex-wrap:wrap;gap:8px;
}
.r-badge-chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px 6px 8px;border-radius:999px;
  background:linear-gradient(180deg,var(--white),var(--paper));
  border:1px solid var(--line-dark);
  font-family:var(--serif-display);font-size:.88rem;color:var(--navy-900);font-weight:600;
}
.r-badge-chip .bdot{
  width:14px;height:14px;border-radius:50%;flex:none;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.4);
}
.r-badge-chip.bronze  .bdot{background:radial-gradient(circle at 30% 30%,#d19364,#8a5a32)}
.r-badge-chip.silver  .bdot{background:radial-gradient(circle at 30% 30%,#dee2ea,#8a95a8)}
.r-badge-chip.gold    .bdot{background:radial-gradient(circle at 30% 30%,var(--gold-300),var(--gold-600))}
.r-badge-chip.diamond .bdot{background:radial-gradient(circle at 30% 30%,#dff5ff,#7cb3d3)}
.r-badge-chip.bronze { border-color:#a6714a }
.r-badge-chip.silver { border-color:#9da5b4 }
.r-badge-chip.gold   { border-color:var(--gold-500) }
.r-badge-chip.diamond{ border-color:#7cb3d3 }
.r-badge-empty{
  font-family:var(--serif-body);font-style:italic;color:var(--muted);font-size:.9rem;
}

/* ===== Engagement pill ===== */
.r-engagement{
  display:inline-flex;align-items:center;gap:8px;
  padding:5px 12px;border-radius:999px;
  font-family:var(--sans-ui);font-size:.76rem;letter-spacing:1.2px;
  text-transform:uppercase;font-weight:600;
}
.r-engagement .eng-dot{width:8px;height:8px;border-radius:50%;flex:none}
.r-engagement.active    {background:rgba(47,107,70,.12);color:var(--success);border:1px solid rgba(47,107,70,.3)}
.r-engagement.active    .eng-dot{background:var(--success)}
.r-engagement.moderate  {background:rgba(200,154,60,.14);color:var(--gold-700);border:1px solid var(--gold-300)}
.r-engagement.moderate  .eng-dot{background:var(--gold-600)}
.r-engagement.low       {background:rgba(164,56,58,.1);color:var(--error);border:1px solid rgba(164,56,58,.3)}
.r-engagement.low       .eng-dot{background:var(--error)}

/* ===== Arabic summary ===== */
.r-arabic{
  direction:rtl;text-align:right;
  background:var(--white);border:1px solid var(--line);border-right:3px solid var(--gold-500);
  border-radius:var(--r-sm);padding:14px 18px;
  font-family:'Amiri','Cairo','Scheherazade New',serif;
  font-size:1.02rem;line-height:1.9;color:var(--navy-900);
}
.r-arabic .r-arabic-label{
  display:block;font-family:var(--sans-ui);font-size:.66rem;
  letter-spacing:2.4px;text-transform:uppercase;color:var(--gold-700);
  font-weight:600;margin-bottom:6px;direction:rtl;
}

/* ===== Signature ===== */
.r-signature{
  display:grid;grid-template-columns:1fr 1fr;gap:40px;
  margin-top:28px;padding-top:22px;border-top:1px solid var(--gold-300);
}
.r-sig-block{font-family:var(--serif-body)}
.r-sig-line{
  border-bottom:1px solid var(--navy-500);
  padding-bottom:2px;margin-bottom:6px;min-height:34px;
  font-family:var(--serif-display);font-size:1.18rem;color:var(--navy-900);
  font-style:italic;
}
.r-sig-name{
  font-family:var(--serif-display);font-size:1rem;color:var(--navy-900);
  font-weight:600;
}
.r-sig-role{
  font-family:var(--sans-ui);font-size:.7rem;color:var(--muted);
  letter-spacing:1.6px;text-transform:uppercase;margin-top:2px;
}
.r-stamp{
  position:relative;width:90px;height:90px;margin-left:auto;margin-right:4px;
  border:2px solid var(--gold-600);border-radius:50%;
  display:grid;place-items:center;text-align:center;
  transform:rotate(-6deg);color:var(--gold-700);opacity:.75;
  font-family:var(--serif-display);font-size:.64rem;line-height:1.1;
  letter-spacing:1.6px;text-transform:uppercase;
  padding:8px;
  background:radial-gradient(circle,rgba(255,255,255,.4),rgba(246,236,211,.2));
}
.r-stamp::before{
  content:"";position:absolute;inset:5px;border:1px dashed var(--gold-500);
  border-radius:50%;opacity:.55;
}

@media(max-width:820px){
  .report-sheet{padding:26px 22px}
  .r-header{flex-direction:column;align-items:flex-start;gap:14px}
  .r-date-col{text-align:left}
  .r-student-info{grid-template-columns:1fr 1fr}
  .r-info-cell{border-right:none;border-bottom:1px solid var(--line);padding:8px 14px}
  .r-perf-grid,.r-outcomes,.r-skills,.r-signature{grid-template-columns:1fr}
}
@media print{
  body.printing-report .topbar,body.printing-report .nav,body.printing-report .foot,body.printing-report .report-tools,body.printing-report .btn{display:none!important}
  body.printing-report{background:#fff!important}
  body.printing-report .page{padding:0;max-width:none}
  body.printing-report .report-sheet{border:none!important;border-top:4px solid var(--navy-900)!important;box-shadow:none!important;border-radius:0!important;padding:8mm!important;page-break-after:always;break-after:page;background:#fff!important;font-size:.84rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.printing-report .report-sheet:last-child{page-break-after:auto;break-after:auto}
  body.printing-report .r-header,body.printing-report .r-student-info,body.printing-report .r-score-tile,body.printing-report .r-badges{page-break-inside:avoid;break-inside:avoid}
  body.printing-report .r-score-tile,body.printing-report .r-skill-bar-fill,body.printing-report .r-engagement,body.printing-report .r-score-band,body.printing-report .r-outcome-col,body.printing-report .r-comment,body.printing-report .r-reco,body.printing-report .r-summary-text,body.printing-report .r-arabic,body.printing-report .r-student-info{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.printing-report .r-comment-reco-row{display:grid;grid-template-columns:1.2fr 1fr;gap:10px}
  @page{size:A4;margin:0}
}

/* ===== Certificate (ported; school branding removed) ===== */
.cert-sheet{background:var(--paper);border:12px double var(--gold-500);
  padding:50px 60px;text-align:center;border-radius:var(--r-md);
  position:relative;font-family:var(--serif-display);
  background-image:
    radial-gradient(circle at 10% 10%,rgba(200,154,60,.08),transparent 40%),
    radial-gradient(circle at 90% 90%,rgba(30,50,96,.05),transparent 40%)}
.cert-sheet::after{content:"";position:absolute;inset:14px;
  border:1px solid var(--gold-300);pointer-events:none;border-radius:4px}
.cert-crest{width:80px;height:80px;margin:0 auto 20px;
  background:radial-gradient(circle at 30% 30%,var(--gold-300),var(--gold-600));
  border-radius:50%;border:3px double var(--navy-900);
  display:grid;place-items:center;font-size:2rem;color:var(--navy-900);font-weight:600}
.cert-head{letter-spacing:6px;font-size:.82rem;color:var(--gold-700);
  text-transform:uppercase;font-family:var(--sans-ui)}
.cert-title{font-size:2.6rem;margin:10px 0 20px}
.cert-name{font-size:2rem;font-style:italic;color:var(--navy-800);
  margin:10px 0 16px;border-bottom:1px solid var(--gold-400);
  display:inline-block;padding:0 30px 4px}
.cert-body{font-size:1.1rem;color:var(--ink-soft);max-width:560px;
  margin:0 auto;line-height:1.6;font-family:var(--serif-body)}
.cert-foot{display:flex;justify-content:space-between;margin-top:44px;
  padding-top:20px;border-top:1px solid var(--gold-300)}
.cert-sig{text-align:left;font-family:var(--serif-body)}
.cert-sig .sig-name{font-family:var(--serif-display);font-size:1.15rem;
  color:var(--navy-900);border-bottom:1px solid var(--navy-500);padding-bottom:3px}
.cert-sig .sig-role{font-size:.8rem;color:var(--muted);letter-spacing:1.4px;
  text-transform:uppercase;font-family:var(--sans-ui);margin-top:4px}
@media print{
  body.printing-cert .topbar,body.printing-cert .nav,body.printing-cert .btn,body.printing-cert .foot{display:none!important}
  body.printing-cert{background:#fff!important}
  body.printing-cert .page{padding:0;max-width:none}
  body.printing-cert .cert-sheet{box-shadow:none!important;break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.printing-cert .cert-crest,body.printing-cert .cert-sheet{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A4 landscape;margin:12mm}
}

/* ===== Lesson worksheet print (ported) ===== */
/* ======================================================================
   LESSON WORKSHEET · Print-perfect, branded A4 deliverable
   A purpose-built sheet (not a screenshot of the screen layout). Hidden on
   screen; revealed only during print via body.lp-printing. A table thead/
   tfoot supplies a running header & footer that repeat on every A4 page.
   ====================================================================== */
#lessonPrintMount{display:none}

.lp-sheet{font-family:var(--serif-body);color:var(--ink)}
.lp-table{width:100%;border-collapse:collapse}
.lp-table>thead{display:table-header-group}
.lp-table>tfoot{display:table-footer-group}
.lp-table>tbody>tr>td,.lp-table>thead>tr>td,.lp-table>tfoot>tr>td{padding:0;vertical-align:top}

/* Running header (repeats per page) */
.lp-runhead{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:0 0 6px;border-bottom:2px solid var(--gold-500)}
.lp-rh-left{display:flex;align-items:center;gap:9px}
.lp-rh-crest{width:26px;height:26px;border-radius:50%;flex:0 0 26px;
  background:radial-gradient(circle at 30% 30%,var(--gold-400),var(--gold-600) 60%,var(--gold-700));
  border:1.5px solid var(--navy-900);color:var(--navy-900);
  font-family:var(--serif-display);font-weight:700;font-size:.9rem;
  display:flex;align-items:center;justify-content:center}
.lp-rh-name{font-family:var(--serif-display);font-weight:600;color:var(--navy-900);font-size:.95rem;letter-spacing:.2px}
.lp-rh-meta{font-family:var(--sans-ui);font-size:.62rem;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold-700);font-weight:600;text-align:right;white-space:nowrap}
.lp-head-pad{height:10px}

/* Running footer (repeats per page) */
.lp-foot-pad{height:12px}
.lp-runfoot{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding-top:6px;border-top:1px solid var(--line-dark);
  font-family:var(--sans-ui);font-size:.6rem;letter-spacing:.5px;color:var(--muted)}
.lp-rf-mid{color:var(--navy-700);font-weight:600;letter-spacing:.8px;text-align:center;flex:1}
.lp-rf-orn{font-family:var(--serif-display);color:var(--gold-600);font-size:.82rem}

/* Title block */
.lp-eyebrow{font-family:var(--sans-ui);font-size:.62rem;letter-spacing:2.6px;text-transform:uppercase;color:var(--gold-700);font-weight:600;margin:14px 0 5px}
.lp-title{font-family:var(--serif-display);font-size:1.75rem;color:var(--navy-900);line-height:1.08;margin:0 0 3px}
.lp-subline{font-family:var(--sans-ui);font-size:.74rem;color:var(--muted);letter-spacing:.3px;margin-bottom:11px}

/* Name / class / date strip */
.lp-fields{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;
  border:1px solid var(--line-dark);border-radius:4px;padding:8px 12px;margin-bottom:13px;background:var(--ivory)}
.lp-field{display:flex;align-items:flex-end;gap:6px;font-family:var(--sans-ui);font-size:.66rem;text-transform:uppercase;letter-spacing:1px;color:var(--navy-800);font-weight:700}
.lp-fline{display:inline-block;min-width:88px;border-bottom:1px solid var(--navy-600);height:14px}
.lp-field.grow{flex:1}.lp-field.grow .lp-fline{min-width:150px;width:100%}

/* Meta grid */
.lp-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:15px}
.lp-meta>div{border-left:2px solid var(--gold-500);padding:1px 0 1px 9px;font-family:var(--sans-ui);font-size:.74rem;color:var(--ink-soft);line-height:1.3}
.lp-meta strong{display:block;font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;font-weight:700}

/* Sections */
.lp-section{margin-bottom:13px;break-inside:avoid}
.lp-h{font-family:var(--serif-display);font-size:1.04rem;color:var(--navy-800);
  border-bottom:1px solid var(--line-dark);padding-bottom:3px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.lp-h-num{font-family:var(--sans-ui);font-size:.55rem;letter-spacing:1.5px;color:var(--gold-700);font-weight:700;border:1px solid var(--gold-400);border-radius:3px;padding:1px 6px;text-transform:uppercase}
.lp-h-count{margin-left:auto;font-family:var(--sans-ui);font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600}
.lp-section p{font-size:.85rem;line-height:1.5;margin:0 0 6px;color:var(--ink-soft)}

/* Examples */
.lp-examples{display:flex;flex-direction:column;gap:4px}
.lp-ex-line{font-size:.85rem;padding:3px 10px 3px 26px;position:relative;border-radius:3px;line-height:1.4}
.lp-ex-line.right{background:rgba(42,68,120,.06);color:var(--navy-800)}
.lp-ex-line.wrong{background:rgba(138,106,32,.08);color:var(--gold-700)}
.lp-ex-line::before{position:absolute;left:8px;top:3px;font-weight:700;font-family:var(--sans-ui);font-size:.8rem}
.lp-ex-line.right::before{content:"\2713";color:var(--navy-600)}
.lp-ex-line.wrong::before{content:"\2715";color:var(--gold-600)}

/* Bullet lists */
.lp-list{margin:0;padding-left:18px}
.lp-list li{font-size:.83rem;line-height:1.45;margin-bottom:3px;color:var(--ink-soft)}

/* Arabic insight */
.lp-arabic{direction:rtl;text-align:right;background:var(--ivory);border-right:3px solid var(--gold-500);
  border-radius:4px;padding:8px 12px;font-size:.98rem;line-height:1.8;color:var(--navy-800);
  font-family:'Noto Naskh Arabic','Amiri','Scheherazade New',var(--serif-body)}

/* Practice exercises (worksheet form) */
.lp-ex{display:flex;gap:10px;margin-bottom:11px;break-inside:avoid}
.lp-ex-num{flex:0 0 22px;width:22px;height:22px;border-radius:50%;background:var(--navy-800);color:var(--ivory);
  font-family:var(--sans-ui);font-size:.74rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.lp-ex-body{flex:1;min-width:0}
.lp-ex-prompt{font-size:.85rem;color:var(--ink);margin-bottom:5px;line-height:1.4}
.lp-ex-tag{display:inline-block;font-family:var(--sans-ui);font-size:.5rem;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold-700);border:1px solid var(--gold-300);border-radius:3px;padding:0 5px;margin-left:6px;vertical-align:middle}
.lp-mcq{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:2px 18px}
.lp-mcq li{font-size:.82rem;display:flex;align-items:center;gap:7px;padding:1px 0;color:var(--ink-soft)}
.lp-bubble{flex:0 0 16px;width:16px;height:16px;border:1.4px solid var(--navy-600);border-radius:50%;
  font-family:var(--sans-ui);font-size:.57rem;font-weight:700;color:var(--navy-700);display:flex;align-items:center;justify-content:center}
.lp-given{font-size:.83rem;background:var(--ivory);border:1px solid var(--line-dark);border-radius:3px;padding:4px 9px;margin-bottom:5px;color:var(--navy-800);font-style:italic}
.lp-blank{display:inline-block;min-width:84px;border-bottom:1px solid var(--navy-600);height:13px;margin:0 2px}
.lp-writeline{border-bottom:1px solid var(--line-dark);height:18px;margin-top:5px}
.lp-fillsentence{font-size:.87rem;line-height:1.95;color:var(--ink)}
.lp-chips{display:flex;flex-wrap:wrap;gap:5px;margin:2px 0 4px}
.lp-chip{font-family:var(--sans-ui);font-size:.74rem;border:1px solid var(--navy-500);border-radius:4px;padding:2px 9px;color:var(--navy-700);background:var(--navy-50)}
.lp-match{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;margin-top:2px}
.lp-match-col{display:flex;flex-direction:column;gap:4px}
.lp-match-item{font-size:.8rem;display:flex;align-items:center;gap:7px;color:var(--ink-soft)}
.lp-match-box{flex:0 0 20px;width:20px;height:16px;border:1px solid var(--navy-600);border-radius:3px}
.lp-match-letter{flex:0 0 16px;font-family:var(--sans-ui);font-weight:700;color:var(--navy-700);font-size:.76rem}

/* Answer key (own page) */
.lp-key{break-before:page;page-break-before:always}
.lp-key .lp-h{border-color:var(--navy-700)}
.lp-key-badge{margin-left:auto;font-family:var(--sans-ui);font-size:.54rem;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:var(--gold-600);border-radius:3px;padding:2px 8px;font-weight:700}
.lp-key-grid{columns:2;column-gap:22px}
.lp-key-item{break-inside:avoid;margin-bottom:8px;font-size:.78rem;line-height:1.45;color:var(--ink-soft)}
.lp-key-n{font-family:var(--sans-ui);font-weight:700;color:var(--navy-800);margin-right:4px}
.lp-key-a{color:var(--navy-800);font-weight:600}
.lp-key-x{display:block;color:var(--muted);font-size:.72rem;margin-top:1px}

/* Multi-lesson picker (screen-only modal UI) */
.lp-opt-row{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.lp-pick-list{max-height:300px;overflow-y:auto;border:1px solid var(--line-dark);border-radius:6px;padding:2px 0;margin-bottom:18px;background:var(--white)}
.lp-grade-head{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--navy-50);
  font-family:var(--sans-ui);font-size:.7rem;font-weight:700;letter-spacing:.6px;color:var(--navy-800);
  text-transform:uppercase;cursor:pointer;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--line)}
.lp-pick-item{display:flex;align-items:center;gap:9px;padding:5px 12px 5px 28px;font-size:.84rem;color:var(--ink-soft);cursor:pointer}
.lp-pick-item:hover{background:var(--navy-50)}
.lp-pick-item .code{font-family:var(--sans-ui);font-size:.65rem;color:var(--gold-700);font-weight:700;letter-spacing:.4px;flex:0 0 auto}
.lp-sep-toggle{display:flex;align-items:flex-start;gap:9px;font-size:.9rem;color:var(--ink-soft);cursor:pointer;
  background:var(--navy-50);border:1px solid var(--line-dark);border-radius:6px;padding:10px 12px;margin-bottom:18px}
.lp-sep-toggle input{margin-top:3px}

@media print{
  body.lp-printing>*{display:none!important}
  body.lp-printing>#lessonPrintMount{display:block!important}
  body.lp-printing{background:#fff!important}
  .lp-sheet + .lp-sheet{break-before:page;page-break-before:always}
  #lessonPrintMount,.lp-rh-crest,.lp-fields,.lp-meta>div,.lp-ex-line.right,.lp-ex-line.wrong,
  .lp-arabic,.lp-ex-num,.lp-bubble,.lp-chip,.lp-key-badge{
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A4;margin:13mm}
}

/* ====================================================================
   REDESIGN LAYER (screen components only — print blocks unchanged)
   Planned future extraction: css/components.css, css/student.css,
   css/teacher.css, css/responsive.css
   ==================================================================== */

/* ----- Accessibility foundation ----- */
:focus-visible{outline:3px solid var(--accent-sky);outline-offset:2px;border-radius:4px}
.btn:focus-visible{outline-color:var(--gold-500)}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}

/* ----- Image slots & graceful placeholders ----- */
.ga-img{position:relative;border-radius:var(--r-lg);overflow:hidden;background:
  linear-gradient(135deg,var(--navy-50),var(--ivory) 55%,var(--gold-100));
  border:1px solid var(--line);min-height:120px}
.ga-img>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.ga-img .ga-img-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;text-align:center;padding:14px;color:var(--navy-600);font-family:var(--sans-ui);
  background-image:radial-gradient(circle at 20% 30%,rgba(200,154,60,.1),transparent 45%),
    radial-gradient(circle at 80% 70%,rgba(79,143,219,.08),transparent 45%)}
.ga-img .ga-img-ph .placeholder-icon{font-size:1.5rem;color:var(--gold-600)}
.ga-img .ga-img-ph strong{font-size:.82rem;color:var(--navy-800)}
.ga-img .ga-img-ph small{font-size:.62rem;letter-spacing:.4px;color:var(--muted)}
.ga-img.has-img .ga-img-ph{display:none}

/* ----- Hero (student overview) ----- */
.hero{position:relative;border-radius:var(--r-xl);overflow:hidden;margin-bottom:var(--sp-6);
  background:linear-gradient(120deg,var(--navy-900) 0%,var(--navy-700) 55%,var(--navy-600) 100%);
  color:var(--ivory);box-shadow:var(--shadow-2)}
.hero .hero-art{position:absolute;inset:0;opacity:.28;border-radius:0;border:none;min-height:0}
.hero .hero-art .ga-img-ph{color:var(--gold-300);background-image:none}
.hero .hero-art .ga-img-ph strong,.hero .hero-art .ga-img-ph small{color:rgba(250,246,238,.55)}
.hero-inner{position:relative;z-index:1;padding:clamp(28px,5vw,52px);max-width:680px}
.hero .eyebrow{color:var(--gold-300)}
.hero .eyebrow::before{background:var(--gold-400)}
.hero h1{color:var(--ivory)}
.hero p{color:rgba(250,246,238,.82);max-width:520px}
.hero-meta{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px}
.hero-meta .tag{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22);color:var(--gold-200,#e8cf9a)}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px}
.btn.sentence{text-transform:none;letter-spacing:.3px;font-size:.92rem;font-weight:600}
.hero-progress{display:flex;align-items:center;gap:12px;margin-top:22px;font-family:var(--sans-ui);font-size:.8rem;color:rgba(250,246,238,.85)}
.hero-bar{flex:1;max-width:300px;height:8px;border-radius:999px;background:rgba(255,255,255,.16);overflow:hidden}
.hero-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold-500),var(--gold-300));transition:width var(--t-slow) var(--ease)}

/* ----- Continue-learning card ----- */
.continue-card{display:flex;gap:18px;align-items:center;background:var(--white);
  border:1px solid var(--line);border-left:4px solid var(--accent-sky);
  border-radius:var(--r-lg);padding:20px 22px;box-shadow:var(--shadow-1);margin-bottom:var(--sp-5);flex-wrap:wrap}
.continue-card .cc-icon{width:52px;height:52px;flex:none;border-radius:var(--r-md);
  background:var(--accent-sky-soft);color:var(--accent-sky);display:grid;place-items:center}
.continue-card .cc-body{flex:1;min-width:200px}
.continue-card .cc-kicker{font-family:var(--sans-ui);font-size:.66rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent-sky);font-weight:700}
.continue-card h3{margin:2px 0 4px}
.continue-card .cc-sub{font-family:var(--sans-ui);font-size:.8rem;color:var(--muted)}

/* ----- Stat chips / summary ----- */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:var(--sp-6)}
.sum-chip{background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px}
.sum-chip .sc-val{font-family:var(--serif-display);font-size:1.7rem;font-weight:600;color:var(--navy-900);line-height:1.1}
.sum-chip .sc-label{font-family:var(--sans-ui);font-size:.66rem;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:2px}
.sum-chip.c-sky{border-top:3px solid var(--accent-sky)} .sum-chip.c-teal{border-top:3px solid var(--accent-teal)}
.sum-chip.c-amber{border-top:3px solid var(--accent-amber)} .sum-chip.c-emerald{border-top:3px solid var(--accent-emerald)}
.sum-chip.c-violet{border-top:3px solid var(--accent-violet)} .sum-chip.c-coral{border-top:3px solid var(--accent-coral)}

/* ----- Pathway cards ----- */
.pathway-card{display:flex;flex-direction:column;gap:8px}
.pathway-card .pc-row{display:flex;flex-wrap:wrap;gap:8px;font-family:var(--sans-ui);font-size:.74rem;color:var(--muted)}
.pathway-card .pc-bar{height:7px;border-radius:999px;background:var(--navy-50);overflow:hidden;margin:6px 0 4px}
.pathway-card .pc-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-emerald),var(--accent-teal));border-radius:999px;transition:width var(--t-slow) var(--ease)}
.pathway-card .pc-actions{margin-top:auto;padding-top:10px}

/* ----- Topic icons ----- */
.tico{display:inline-grid;place-items:center;border-radius:12px;flex:none;color:var(--navy-700);background:var(--navy-50)}
.tico svg{display:block}
.tico.s24{width:32px;height:32px}.tico.s24 svg{width:18px;height:18px}
.tico.s32{width:44px;height:44px}.tico.s32 svg{width:24px;height:24px}
.tico.s48{width:64px;height:64px}.tico.s48 svg{width:34px;height:34px}
.tico.tone-sky{background:var(--accent-sky-soft);color:var(--accent-sky)}
.tico.tone-teal{background:var(--accent-teal-soft);color:var(--accent-teal)}
.tico.tone-amber{background:var(--accent-amber-soft);color:var(--accent-amber)}
.tico.tone-emerald{background:var(--accent-emerald-soft);color:var(--accent-emerald)}
.tico.tone-violet{background:var(--accent-violet-soft);color:var(--accent-violet)}
.tico.tone-coral{background:var(--accent-coral-soft);color:var(--accent-coral)}

/* ----- Chapter journey ----- */
.chapter-block{margin:0 0 var(--sp-7)}
.chapter-head{position:relative;border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px;
  min-height:130px;display:flex;align-items:flex-end;box-shadow:var(--shadow-1)}
.chapter-head .ga-img{position:absolute;inset:0;border-radius:0;border:none}
.chapter-head .ch-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,27,58,.05) 20%,rgba(14,27,58,.72));z-index:1}
.chapter-head .ch-title{position:relative;z-index:2;padding:18px 22px;color:var(--ivory);width:100%}
.chapter-head .ch-title h2{color:var(--ivory);font-size:clamp(1.3rem,2.6vw,1.8rem)}
.chapter-head .ch-count{font-family:var(--sans-ui);font-size:.72rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold-300);font-weight:600}
.journey{list-style:none;margin:0;padding:0;position:relative}
.journey::before{content:"";position:absolute;left:31px;top:18px;bottom:18px;width:2px;
  background:linear-gradient(180deg,var(--line-dark),var(--gold-300),var(--line-dark));z-index:0}
.jnode{position:relative;z-index:1;display:flex;gap:16px;align-items:flex-start;padding:10px 0}
.jnode .jn-dot{width:64px;flex:none;display:grid;place-items:center}
.jnode .jn-card{flex:1;background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:16px 20px;box-shadow:var(--shadow-1);transition:transform var(--t-med) var(--ease),box-shadow var(--t-med) var(--ease);min-width:0}
.jnode .jn-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-2)}
.jnode .jn-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.jnode .jn-num{font-family:var(--sans-ui);font-size:.64rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);font-weight:700}
.jnode h3{font-size:1.18rem;overflow-wrap:break-word}
.jnode .jn-week{font-family:var(--sans-ui);font-size:.76rem;color:var(--muted);margin:2px 0 10px}
.jnode .jn-stats{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:var(--sans-ui);font-size:.74rem;color:var(--ink-soft)}
.jnode .jn-actions{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.jnode .jn-bar{height:6px;border-radius:999px;background:var(--navy-50);overflow:hidden;flex:1;min-width:90px;max-width:200px}
.jnode .jn-bar i{display:block;height:100%;border-radius:999px;background:var(--accent-teal);transition:width var(--t-slow) var(--ease)}
/* node state styling */
.jnode.is-progress .jn-card{border-left:4px solid var(--accent-teal)}
.jnode.is-official .jn-card{border-left:4px solid var(--accent-amber)}
.jnode.is-mastered .jn-card{border-left:4px solid var(--accent-emerald);background:linear-gradient(180deg,var(--white),var(--accent-emerald-soft))}
.jnode.is-review .jn-card{border-left:4px solid var(--accent-coral)}
.jnode.is-locked .jn-card{opacity:.55;filter:saturate(.5)}
.jnode.is-next .jn-card{border-color:var(--gold-400);box-shadow:0 0 0 3px rgba(200,154,60,.14),var(--shadow-2)}
.jnode.is-next .jn-num::after{content:" · Recommended next";color:var(--gold-700)}
.pill.review{background:var(--accent-coral-soft);color:#a33e37}
.pill.mastered{background:var(--accent-emerald-soft);color:#2c6e49}
.pill.official-ready{background:var(--accent-amber-soft);color:#9c6f1c}

/* ----- Lesson workspace ----- */
.lesson-head{display:flex;gap:18px;align-items:flex-start;margin:10px 0 6px;flex-wrap:wrap}
.lesson-head .lh-body{flex:1;min-width:240px}
.lesson-status-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px;font-family:var(--sans-ui);font-size:.76rem}
.seq-strip{display:flex;gap:8px;margin:18px 0 6px;flex-wrap:wrap}
.seq-step{flex:1;min-width:130px;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r-md);
  border:1px solid var(--line);background:var(--white);cursor:pointer;font-family:var(--sans-ui);font-size:.82rem;font-weight:600;color:var(--ink-soft);
  transition:all var(--t-fast) var(--ease);text-align:left}
.seq-step .ss-n{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:.72rem;flex:none;background:var(--navy-50);color:var(--navy-700)}
.seq-step:hover{border-color:var(--line-dark);transform:translateY(-1px)}
.seq-step.tone-sky.active{background:var(--accent-sky-soft);border-color:var(--accent-sky);color:#27598f}
.seq-step.tone-sky.active .ss-n{background:var(--accent-sky);color:#fff}
.seq-step.tone-teal.active{background:var(--accent-teal-soft);border-color:var(--accent-teal);color:#1f6e6c}
.seq-step.tone-teal.active .ss-n{background:var(--accent-teal);color:#fff}
.seq-step.tone-amber.active{background:var(--accent-amber-soft);border-color:var(--accent-amber);color:#8a611a}
.seq-step.tone-amber.active .ss-n{background:var(--accent-amber);color:#fff}

/* ----- Teaching blocks (learn tab) ----- */
.tb{border:1px solid var(--line);border-radius:var(--r-md);background:var(--white);padding:16px 20px;margin:0 0 16px;box-shadow:var(--shadow-1)}
.tb .tb-h{font-family:var(--sans-ui);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tb.tb-rule{border-left:4px solid var(--accent-sky)} .tb.tb-rule .tb-h{color:var(--accent-sky)}
.tb.tb-example{border-left:4px solid var(--accent-teal)} .tb.tb-example .tb-h{color:var(--accent-teal)}
.tb.tb-mistake{border-left:4px solid var(--accent-coral);background:linear-gradient(180deg,var(--white),var(--accent-coral-soft))}
.tb.tb-mistake .tb-h{color:var(--accent-coral)}
.tb.tb-trap{border-left:4px solid var(--accent-amber);background:linear-gradient(180deg,var(--white),var(--accent-amber-soft))}
.tb.tb-trap .tb-h{color:#9c6f1c}
.tb.tb-arabic{border-right:4px solid var(--gold-500);border-left:1px solid var(--line)}
.tb.tb-arabic .tb-h{color:var(--gold-700);justify-content:flex-end}

/* ----- Practice meter & feedback ----- */
.bank-meter{position:sticky;top:74px;z-index:5;display:flex;align-items:center;gap:12px;
  background:rgba(253,250,243,.95);backdrop-filter:blur(8px);border:1px solid var(--line);
  border-radius:var(--r-md);padding:10px 16px;margin-bottom:16px;font-family:var(--sans-ui);font-size:.78rem;color:var(--ink-soft)}
.bank-meter .bm-bar{flex:1;height:8px;border-radius:999px;background:var(--navy-50);overflow:hidden}
.bank-meter .bm-bar i{display:block;height:100%;border-radius:999px;background:var(--accent-teal);transition:width var(--t-med) var(--ease)}
.bank-meter.official-meter .bm-bar i{background:var(--accent-amber)}
.bank-meter .bm-count{font-weight:700;color:var(--navy-800);white-space:nowrap}
.exercise.correct{border-color:var(--accent-emerald);background:var(--accent-emerald-soft)}
.exercise.wrong{border-color:var(--accent-coral);background:var(--accent-coral-soft)}
@keyframes tickIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.exercise.done .ex-num{animation:tickIn var(--t-med) var(--ease)}
.banner.official{background:var(--accent-amber-soft);border:1px solid var(--accent-amber);color:#7c5712}
.banner.success{background:var(--accent-emerald-soft);border:1px solid var(--accent-emerald);color:#2c6e49}

/* ----- Dashboard: ring, recommendations ----- */
.ring-wrap{display:flex;gap:22px;align-items:center;flex-wrap:wrap;margin-bottom:var(--sp-5)}
.ring{width:124px;height:124px;flex:none}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring .ring-bg{fill:none;stroke:var(--navy-50);stroke-width:11}
.ring .ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:11;stroke-linecap:round;transition:stroke-dashoffset var(--t-slow) var(--ease)}
.ring-label{position:relative}
.ring-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring-center .rc-val{font-family:var(--serif-display);font-size:1.7rem;font-weight:700;color:var(--navy-900);line-height:1}
.ring-center .rc-sub{font-family:var(--sans-ui);font-size:.58rem;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.reco-panel{border-left:4px solid var(--accent-violet)}
.reco-panel ul{margin:0;padding-left:18px}
.reco-panel li{margin-bottom:8px;color:var(--ink-soft)}
.mastery-cell .m-band{font-family:var(--sans-ui);font-size:.6rem;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-top:2px;color:var(--muted)}
.mastery-cell.weak .m-band{color:var(--accent-coral)}
.mastery-cell.fair .m-band{color:#1f6e6c}
.mastery-cell.strong .m-band{color:#2c6e49}
.state-note{font-family:var(--sans-ui);font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:8px;margin-top:14px}
.state-note::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent-teal);flex:none}

/* ----- Honour cabinet ----- */
.cabinet{position:relative;border-radius:var(--r-lg);overflow:hidden;padding:26px;border:1px solid var(--line);
  background:linear-gradient(180deg,var(--navy-50),var(--ivory))}
.cabinet .cab-art{position:absolute;inset:0;opacity:.2;border-radius:0;border:none}
.cabinet .badge-grid{position:relative;z-index:1}
.badge-item{transition:transform var(--t-med) var(--ease),box-shadow var(--t-med) var(--ease),opacity var(--t-med),filter var(--t-med)}
.badge-item.earned{animation:badgeIn .5s var(--ease)}
@keyframes badgeIn{from{transform:scale(.96);opacity:.6}to{transform:scale(1);opacity:1}}
.badge-prog{height:5px;border-radius:999px;background:var(--navy-50);overflow:hidden;margin-top:8px}
.badge-prog i{display:block;height:100%;border-radius:999px;background:var(--accent-violet)}

/* ----- Empty states ----- */
.empty-state{text-align:center;padding:28px 18px}
.empty-state .ga-img{max-width:260px;margin:0 auto 14px;min-height:140px}
.empty-state p{color:var(--muted);font-style:italic}

/* ----- Teacher banner ----- */
.t-banner{position:relative;border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px;min-height:110px;
  display:flex;align-items:flex-end;background:var(--navy-800)}
.t-banner .ga-img{position:absolute;inset:0;border-radius:0;border:none;opacity:.4}
.t-banner .tb-text{position:relative;z-index:1;padding:16px 22px;color:var(--ivory);width:100%;
  background:linear-gradient(180deg,transparent,rgba(14,27,58,.78))}
.t-banner .tb-text h1{color:var(--ivory);font-size:clamp(1.4rem,3vw,2rem)}
.t-banner .tb-text .eyebrow{color:var(--gold-300);margin-bottom:4px}

/* ----- Bottom navigation (student, mobile) ----- */
.bottombar{display:none}
@media(max-width:768px){
  .bottombar{position:fixed;left:0;right:0;bottom:0;z-index:90;display:flex;
    background:rgba(253,250,243,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bottombar button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:2px;padding:6px 2px;font-family:var(--sans-ui);font-size:.6rem;letter-spacing:.6px;
    text-transform:uppercase;color:var(--muted);font-weight:600;min-height:48px}
  .bottombar button.active{color:var(--navy-900)}
  .bottombar button.active .bb-ic{background:var(--gold-100);color:var(--gold-700)}
  .bottombar .bb-ic{width:30px;height:24px;border-radius:8px;display:grid;place-items:center;color:inherit}
  body.has-bottombar .page{padding-bottom:120px}
  body.has-bottombar .foot{padding-bottom:90px}
}

/* ----- Responsive refinements ----- */
@media(max-width:768px){
  .page{padding:22px 16px 60px}
  .topbar-inner{padding:10px 14px;gap:10px}
  .brand-sub{display:none}
  .nav .btn{padding:7px 10px;font-size:.62rem}
  .journey::before{left:25px}
  .jnode .jn-dot{width:52px}
  .hero-inner{padding:24px 20px}
  .seq-strip{flex-direction:column}
  .seq-step{min-width:0}
  .bank-meter{top:62px}
  .continue-card{flex-direction:column;align-items:flex-start}
  .ring-wrap{justify-content:center;text-align:center}
}
@media(max-width:430px){
  body{font-size:16px}
  .summary-row{grid-template-columns:1fr 1fr}
  .dash-stats{grid-template-columns:1fr 1fr}
  .mastery-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:340px){
  .summary-row,.dash-stats,.mastery-grid{grid-template-columns:1fr}
}

/* ----- Print protection for redesign layer ----- */
@media print{
  .bottombar,.hero,.hero-art,.chapter-head .ga-img,.cabinet .cab-art,.t-banner .ga-img,
  .ga-img-ph,.bank-meter,.seq-strip,.continue-card .btn,.hero-actions{display:none!important}
  body.printing-report .bottombar,body.printing-cert .bottombar,body.lp-printing .bottombar{display:none!important}
}

/* ===== Image-slot aspect fix =====
   object-fit:cover fills the box and crops the overflow. These rules pin each
   slot to the same shape as the artwork so nothing is cropped. Regenerate the
   wide backgrounds as slim banners (see prompt pack) and keep key motifs in the
   central horizontal safe-band. */
.ga-img[data-image="academy-journey-map-background.webp"],
.ga-img[data-image="academy-library-background.webp"]{aspect-ratio:16/5;min-height:0}
.ga-img[data-image="certificate-preview-background.webp"]{aspect-ratio:16/6;min-height:0}
.chapter-head{aspect-ratio:16/5}
.t-banner{aspect-ratio:16/4}
.empty-state .ga-img{aspect-ratio:1/1;min-height:0;max-width:220px}
@media(min-width:760px){.hero{min-height:300px}}
@media(max-width:560px){
  .chapter-head{aspect-ratio:16/7}
  .t-banner{aspect-ratio:16/6}
  .ga-img[data-image="academy-journey-map-background.webp"],
  .ga-img[data-image="academy-library-background.webp"],
  .ga-img[data-image="certificate-preview-background.webp"]{aspect-ratio:16/8}
}
/* Instant fix: image generators only output ~3:2, so a slim banner box would
   crop a full-content image. For these paper-background bands, show the WHOLE
   image (object-fit:contain) on a flat ivory field — the art's own ivory ground
   makes the side margins seamless, so nothing is cropped and there is no visible
   letterbox. (For pixel-perfect full-bleed instead, pad exports to the box ratio
   with the padder script, then this contain rule is harmless.) */
.ga-img[data-image="academy-journey-map-background.webp"],
.ga-img[data-image="academy-library-background.webp"],
.ga-img[data-image="certificate-preview-background.webp"]{background:var(--paper)}
.ga-img[data-image="academy-journey-map-background.webp"]>img,
.ga-img[data-image="academy-library-background.webp"]>img,
.ga-img[data-image="certificate-preview-background.webp"]>img{object-fit:contain}


/* ====================================================================
   PREMIUM FX LAYER · Sound-triggered visual feedback
   Additive only — nothing above this block is modified. Every effect
   here is either transient (a class removed on animationend) or hidden
   in print / honoured under prefers-reduced-motion. Palette is drawn
   from the existing academy tokens (navy / gold / emerald / coral).
   ==================================================================== */

/* ----- Sound control (topbar) ----- */
.sound-toggle{flex:0 0 auto;width:38px;height:38px;margin-left:6px;padding:0;
  display:inline-grid;place-items:center;border-radius:50%;
  border:1px solid var(--line-dark);background:var(--white);color:var(--navy-700);
  font-size:1.05rem;line-height:1;cursor:pointer;font-family:var(--sans-ui);
  transition:transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease),
    border-color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.sound-toggle:hover{border-color:var(--gold-500);box-shadow:var(--shadow-gold);transform:translateY(-1px)}
.sound-toggle:active{transform:scale(.94)}
.sound-toggle:focus-visible{outline:3px solid var(--gold-500);outline-offset:2px}
.sound-toggle .st-on{display:inline}
.sound-toggle .st-off{display:none}
.sound-toggle[aria-pressed="false"]{color:var(--muted);background:var(--navy-50);border-color:var(--line)}
.sound-toggle[aria-pressed="false"] .st-on{display:none}
.sound-toggle[aria-pressed="false"] .st-off{display:inline}
@media(max-width:560px){.sound-toggle{width:34px;height:34px;font-size:.95rem;margin-left:4px}}

/* ----- Full-viewport particle overlay (confetti / sparkle / celebration) ----- */
.fx-layer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.fx-particle{position:absolute;top:0;left:0;will-change:transform,opacity}
.fx-confetti-piece{border-radius:1.5px;animation:fxConfetti var(--fx-dur,1.45s) cubic-bezier(.18,.7,.3,1) forwards}
.fx-spark{border-radius:50%;animation:fxSpark var(--fx-dur,.7s) var(--ease) forwards}
@keyframes fxConfetti{0%{transform:translate(0,0) rotate(0);opacity:1}
  100%{transform:translate(var(--fx-x1),var(--fx-y1)) rotate(var(--fx-rot,360deg));opacity:0}}
@keyframes fxSpark{0%{transform:translate(0,0) scale(0);opacity:0}
  30%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--fx-x1),var(--fx-y1)) scale(.2);opacity:0}}

/* ----- Reusable feedback classes ----- */
.fx-pop{animation:fxPop .32s var(--ease)}
@keyframes fxPop{0%{transform:scale(1)}45%{transform:scale(1.05)}100%{transform:scale(1)}}
.fx-shake{animation:fxShake .42s var(--ease)}
@keyframes fxShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
.fx-success-pulse{animation:fxSuccess .72s var(--ease)}
@keyframes fxSuccess{0%{box-shadow:0 0 0 0 rgba(63,157,105,0)}
  22%{box-shadow:0 0 0 4px rgba(63,157,105,.28),0 0 18px rgba(200,154,60,.18)}
  100%{box-shadow:0 0 0 0 rgba(63,157,105,0)}}
.fx-error-pulse{animation:fxError .6s var(--ease)}
@keyframes fxError{0%{box-shadow:0 0 0 0 rgba(217,107,99,0)}
  25%{box-shadow:0 0 0 4px rgba(217,107,99,.30)}100%{box-shadow:0 0 0 0 rgba(217,107,99,0)}}
.fx-glow-gold{animation:fxGlowGold 1.15s var(--ease)}
@keyframes fxGlowGold{0%{box-shadow:0 0 0 0 rgba(200,154,60,0)}
  30%{box-shadow:0 0 0 6px rgba(200,154,60,.22),0 0 28px rgba(200,154,60,.34)}
  100%{box-shadow:0 0 0 0 rgba(200,154,60,0)}}
.fx-press{transform:scale(.96)!important;transition:transform .09s var(--ease)!important}

/* ----- Lesson / card stagger entrance ----- */
.fx-view-enter{animation:fxFadeUp .45s var(--ease) both}
@keyframes fxFadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fx-view-enter .card{animation:fxFadeUp .5s var(--ease) both}
.fx-view-enter .card:nth-child(1){animation-delay:.03s}
.fx-view-enter .card:nth-child(2){animation-delay:.07s}
.fx-view-enter .card:nth-child(3){animation-delay:.11s}
.fx-view-enter .card:nth-child(4){animation-delay:.15s}
.fx-view-enter .card:nth-child(5){animation-delay:.19s}
.fx-view-enter .card:nth-child(6){animation-delay:.23s}
.fx-view-enter .card:nth-child(7){animation-delay:.27s}
.fx-view-enter .card:nth-child(n+8){animation-delay:.3s}

/* ----- Progress bar grow-in ----- */
.fx-bar-grow{animation:fxBarGrow .9s var(--ease) forwards}
@keyframes fxBarGrow{from{width:0}to{width:var(--fx-target,100%)}}

/* ----- Badge shine sweep (earned honours) ----- */
.badge-item.fx-shine{position:relative;overflow:hidden}
.badge-item.fx-shine::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(105deg,transparent 32%,rgba(255,255,255,.55) 50%,transparent 68%);
  transform:translateX(-130%);animation:fxShine .95s var(--ease) forwards}
@keyframes fxShine{to{transform:translateX(130%)}}

/* ----- Smooth active sequence-tab transition (lesson) ----- */
.seq-step{transition:background var(--t-med) var(--ease),color var(--t-med) var(--ease),
  border-color var(--t-med) var(--ease),box-shadow var(--t-med) var(--ease)}

/* ----- Reduced-motion: suppress particles entirely (state changes remain) ----- */
@media(prefers-reduced-motion:reduce){
  .fx-layer{display:none!important}
}

/* ----- Print safety: no effect chrome ever reaches paper ----- */
@media print{
  .fx-layer,.fx-layer *,.sound-toggle,.fx-particle{display:none!important}
  .fx-view-enter,.fx-success-pulse,.fx-error-pulse,.fx-glow-gold,.fx-shake,
  .fx-pop,.fx-bar-grow,.badge-item.fx-shine{animation:none!important}
  .badge-item.fx-shine::after{display:none!important}
}
/* ====================================================================
   DISPLAY FIXES (post-FX) · hero ghost-button contrast on hover
   The hero sits on a dark image; the default .btn.ghost:hover paints a
   near-white fill which hid the ivory label. Scope a translucent hover
   so the text stays readable on the dark backdrop.
   ==================================================================== */
.hero-actions .btn.ghost{border-color:rgba(255,255,255,.45);color:var(--ivory)}
.hero-actions .btn.ghost:hover{background:rgba(255,255,255,.18);color:var(--ivory);
  border-color:rgba(255,255,255,.72);box-shadow:none}
.hero-actions .btn.ghost:focus-visible{outline:3px solid var(--gold-400)}

/* ====================================================================
   INLINE REPORT EDITING · visual cue for the teacher-editable sheet
   The report sheet becomes contenteditable when the teacher chooses
   "Edit report"; these rules make that state obvious on screen and
   guarantee no editing chrome (outline/caret/tools/chips) ever prints.
   ==================================================================== */
.report-edit-hint{font-family:var(--sans-ui);font-size:.74rem;color:var(--muted);line-height:1.4}
.report-edit-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans-ui);
  font-size:.68rem;letter-spacing:.5px;color:var(--gold-700);background:var(--gold-100);
  border:1px solid var(--gold-400);border-radius:999px;padding:3px 11px;font-weight:600}
.report-sheet.report-editing{outline:2px dashed var(--gold-500);outline-offset:6px;
  box-shadow:0 0 0 6px rgba(200,154,60,.06);cursor:text}
.report-sheet.report-editing :focus{outline:none}
.report-sheet[contenteditable="true"]{caret-color:var(--gold-700)}
@media print{
  .report-tools,.report-edit-hint,.report-edit-chip{display:none!important}
  .report-sheet.report-editing,.report-sheet[contenteditable]{outline:none!important;box-shadow:none!important}
}

/* ====================================================================
   ENTRY EXPERIENCE · Dual academy entrances and remembered user
   New first-user journey: a role-selection screen with two large
   entrance cards (Teacher left · Student right), a remembered-user
   return card, and separate student / teacher access screens.
   Uses existing tokens only.
   REQUIRED IMAGES (place in your project, next to the HTML):
       assets/teacher-entrance.png   ← teacher entrance artwork
       assets/student-entrance.png   ← student entrance artwork
   The hover state (zoom · gold glow · light sweep) is CSS, so no extra
   image is needed. If a file is missing, a graceful placeholder names
   the exact path for you.
   ==================================================================== */

/* hide student nav clutter + footer while on entry screens
   (topbar brand + sound toggle stay; bottombar already hidden) */
body.on-entry .nav{display:none}
body.on-entry .foot{display:none}

.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

.entry-stage{min-height:calc(100vh - 86px);display:grid;place-items:center;padding:30px 20px 56px}
.entry-roles-wrap{width:100%;max-width:960px;margin:0 auto}
.entry-roles-wrap .access-head{text-align:center;margin:2px auto 26px;max-width:620px}

/* ---------- Two role entrance cards ---------- */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch}
.role-entrance{position:relative;display:block;width:100%;aspect-ratio:4/3;padding:0;border:none;
  cursor:pointer;border-radius:var(--r-xl);overflow:hidden;background:var(--paper);text-align:left;
  box-shadow:var(--shadow-2);-webkit-tap-highlight-color:transparent;
  transition:transform .4s var(--ease),box-shadow .4s var(--ease)}
.re-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .65s var(--ease),filter .5s var(--ease)}
.re-veil{position:absolute;inset:0;pointer-events:none;opacity:1;transition:opacity .4s var(--ease);
  background:linear-gradient(180deg,rgba(14,27,58,.12) 30%,rgba(14,27,58,.66))}
.re-sweep{position:absolute;inset:0;pointer-events:none;transform:translateX(-130%);transition:transform .85s var(--ease);
  background:linear-gradient(105deg,transparent 36%,rgba(255,255,255,.34) 50%,transparent 64%)}
.re-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  font-family:var(--sans-ui);background:linear-gradient(135deg,var(--navy-700),var(--navy-900));color:var(--gold-300)}
.role-entrance.student .re-ph{background:linear-gradient(135deg,var(--gold-500),var(--gold-700));color:var(--navy-900)}
.re-ph .ph-crest{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--serif-display);font-weight:700;font-size:1.4rem;border:2px solid currentColor;background:rgba(255,255,255,.12)}
.re-ph small{font-size:.66rem;letter-spacing:.4px;opacity:.92}
.role-entrance.has-img .re-ph{display:none}
.re-content{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:24px 26px;display:flex;flex-direction:column;gap:5px}
.re-main{font-family:var(--serif-display);font-weight:700;font-size:1.7rem;line-height:1.1;color:#fff}
.re-sub{font-family:var(--serif-body);font-size:.95rem;color:rgba(255,255,255,.88);max-width:36ch}
.re-label{margin-top:9px;align-self:flex-start;font-family:var(--sans-ui);font-size:.7rem;letter-spacing:1.8px;
  text-transform:uppercase;font-weight:600;color:var(--navy-900);border:1px solid var(--gold-700);
  background:linear-gradient(180deg,var(--gold-400),var(--gold-600));padding:8px 16px;border-radius:999px;
