<script>
(function () {
  "use strict";

  /* ---------- storage (TERM-AWARE) ------------------------------------
     Locked decision #2: progress is namespaced by term, so Term 3 data
     and a future Term 1 never collide. Privacy: students are NUMBERS.
     ------------------------------------------------------------------ */
  var STORE_KEY = "mm_grammar_academy_v3";
  var store = {
    load: function () {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { students: {} }; }
      catch (e) { return { students: {} }; }
    },
    save: function (d) { try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch (e) {} }
  };
  function studentRec(num) {
    var d = store.load();
    if (!d.students[num]) d.students[num] = { num: num, progress: {} };
    return { d: d, s: d.students[num] };
  }
  // progress path: students[num].progress[term][lessonId] = {practice:{...}, official:{...}}
  function lessonProgress(num, term, lid) {
    var r = studentRec(num);
    var p = r.s.progress;
    if (!p[term]) p[term] = {};
    if (!p[term][lid]) p[term][lid] = { practice: null, official: null };
    return { d: r.d, rec: p[term][lid] };
  }

  /* ---------- registry ------------------------------------------------ */
  GA.registry = { terms: {}, pathways: {}, lessons: {} };
  function pkey(t, g, s) { return t + "|" + g + "|" + s; }

  GA.register = function (mod) {
    if (!mod || !mod.term || !mod.grade || !mod.stream) {
      console.warn("[GA] ignored a module with missing term/grade/stream", mod); return;
    }
    var key = pkey(mod.term, mod.grade, mod.stream);
    GA.registry.terms[mod.term] = GA.registry.terms[mod.term] || { id: mod.term, label: mod.termLabel || mod.term };
    GA.registry.pathways[key] = {
      key: key, term: mod.term, termLabel: mod.termLabel || mod.term,
      grade: mod.grade, stream: mod.stream, streamLabel: mod.streamLabel || (mod.grade + " " + mod.stream),
      cefr: mod.cefr || "", source: mod.source || "", chapters: mod.chapters || []
    };
    Object.keys(mod.lessons || {}).forEach(function (lid) {
      var L = mod.lessons[lid];
      L._key = key; L._term = mod.term;
      GA.registry.lessons[lid] = L;
    });
    GA._validate(key);
  };

  /* ---------- validator (locked decision #4) --------------------------
     practice and official must share NO question. Console-warns on any
     normalized prompt/stem overlap >= 0.85; result surfaces in #teacher.
     ------------------------------------------------------------------ */
  GA._flags = {};
  function stem(ex) {
    var parts = [ex.prompt, ex.sentence, ex.given];
    if (ex.options) parts = parts.concat(ex.options);          // mcq
    if (ex.answers) parts = parts.concat(ex.answers);          // fill
    if (Array.isArray(ex.answer)) parts = parts.concat(ex.answer); // transform/error
    else if (typeof ex.answer === "string") parts.push(ex.answer); // reorder
    if (ex.bank) parts = parts.concat(ex.bank);                // reorder
    if (ex.pairs) parts = parts.concat(ex.pairs.map(function (p) { return p.l + " " + p.r; })); // match
    return parts.filter(Boolean).join(" ");

  function sim(a, b) {
    var na = Grade.normalize(a), nb = Grade.normalize(b);
    if (!na || !nb) return 0; if (na === nb) return 1;
    var A = na.split(" "), B = new Set(nb.split(" ")), hit = 0;
    A.forEach(function (w) { if (B.has(w)) hit++; });
    return hit / Math.max(A.length, B.size);
  }
  GA._validate = function (key) {
    Object.keys(GA.registry.lessons).forEach(function (lid) {
      var L = GA.registry.lessons[lid];
      if (L._key !== key) return;
      var issues = [];
      ["practice", "official"].forEach(function (bank) {
        if (!Array.isArray(L[bank]) || !L[bank].length) issues.push("missing/empty " + bank + " bank");
      });
      (L.official || []).forEach(function (oq) {
        (L.practice || []).forEach(function (pq) {
          if (oq.type !== pq.type) return;
          if (sim(stem(oq), stem(pq)) >= 0.85) issues.push("practice/official overlap near \"" + (oq.prompt || "").slice(0, 40) + "…\"");
        });
      });
      if (issues.length) {
        GA._flags[lid] = issues;
        console.warn("[GA validator] " + lid + ": " + issues.join(" · "));
      }
    });
  };

  /* ---------- grading (PORTED — byte-for-byte with the monolith) ------ */
  var Grade = {
    normalize: function (s) {
      return (s || "").toLowerCase()
        .replace(/[.,'""''`’!?;:]/g, "")
        .replace(/\s+/g, " ").trim();
    },
    blank: function (ex) {
      switch (ex.type) {
        case "mcq": return { selected: null };
        case "fill": case "transform": case "error": return { value: "" };
        case "reorder": return { words: [] };
        case "match": return { matches: {}, selectedLeft: null };
      }
      return {};
    },
    check: function (ex, st) {
      switch (ex.type) {
        case "mcq": return st.selected === ex.answer;
        case "fill": return ex.answers.some(function (a) { return Grade.normalize(st.value) === Grade.normalize(a); });
        case "transform": case "error": return ex.answer.some(function (a) { return Grade.normalize(st.value) === Grade.normalize(a); });
        case "reorder": return Grade.normalize((st.words || []).join(" ")) === Grade.normalize(ex.answer);
        case "match": return ex.pairs.every(function (_, j) { return st.matches && st.matches[j] === j; });
      }
      return false;
    }

  /* ---------- helpers -------------------------------------------------- */
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

     ==================================================================== */

  /* ---- GAMeta: single metadata utility (dynamic term / AY — no hardcoding) ---- */

    pathway: function (t, g, s) { return GA.registry.pathways[pkey(t, g, s)] || null; },
    // "Term 1 · AY 2026–27" → full phrase
    termPhrase: function (pw) { return (pw && pw.termLabel) || ""; },
    // "Term 1" (parsed from termLabel, falling back to the term id "T1-...")
    termShort: function (pw) {

      var m = /^\s*(Term\s*\d+)/i.exec(pw.termLabel || "");
      if (m) return m[1];
      var m2 = /^T(\d+)/i.exec(pw.term || "");

    },
    // "2026–27" (parsed from termLabel after "AY", falling back to id digits)
    ayPhrase: function (pw) {
      if (!pw) return "";

    },

    arabicTerm: function (pw) {

      return "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062f\u0631\u0627\u0633\u064a " + (names[n] || "");
    }
  };
  GA._meta = GAMeta; // expose for tests

  /* ---- Topic icon system (inline SVG, rounded line art, currentColor) ----

     the app stays offline-first even before icon files exist. */
  function svgWrap(inner) {

  }
  var TOPIC_ICONS = {
    "word-order":        svgWrap('<rect x="3" y="5" width="7" height="4" rx="1.5"/><rect x="12" y="5" width="9" height="4" rx="1.5"/><rect x="3" y="15" width="9" height="4" rx="1.5"/><rect x="14" y="15" width="7" height="4" rx="1.5"/><path d="M12 9v2m0 0H7m5 0h5"/>'),
    "contractions":      svgWrap('<path d="M8 6h8M8 18h8"/><path d="M12 6v4m0 4v4"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>'),
    "comparatives":      svgWrap('<path d="M4 18v-6m6 6V8m6 10V4"/><path d="M3 21h18"/>'),
    "prepositions":      svgWrap('<circle cx="12" cy="9" r="3.5"/><path d="M12 12.5V21M8 21h8"/><path d="M5 5l3 2M19 5l-3 2"/>'),

    "ability-modals":    svgWrap('<path d="M6 12l4 4 8-9"/><circle cx="12" cy="12" r="9.5"/>'),
    "certainty-modals":  svgWrap('<circle cx="12" cy="12" r="9.5"/><path d="M12 7v6"/><circle cx="12" cy="16.6" r="1" fill="currentColor" stroke="none"/>'),
    "transitions":       svgWrap('<path d="M4 8h10l-2.5-2.5M14 8l-2.5 2.5"/><path d="M20 16H10l2.5-2.5M10 16l2.5 2.5"/>'),
    "question-tags":     svgWrap('<path d="M9 9a3 3 0 1 1 4.2 2.8c-.9.4-1.2 1-1.2 2"/><circle cx="12" cy="17.4" r="1" fill="currentColor" stroke="none"/><rect x="3" y="3" width="18" height="18" rx="4"/>'),

    "sequencing-adverbs":svgWrap('<path d="M5 6h14M5 12h14M5 18h14"/><circle cx="3.2" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3.2" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3.2" cy="18" r="1" fill="currentColor" stroke="none"/>'),
    "grammar-default":   svgWrap('<path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3z"/><path d="M5 17a3 3 0 0 0 3 3"/><path d="M9 8h6M9 12h4"/>')
  };
  var TOPIC_KEYS = [
    [/word order|sentence structure/i, "word-order"],
    [/contraction/i, "contractions"],
    [/comparat|superlat/i, "comparatives"],
    [/preposition/i, "prepositions"],
    [/reference|substitution/i, "reference-words"],
    [/certainty|probability|doubt|deduction/i, "certainty-modals"],
    [/can\s*\/?\s*can'?t|\bability\b/i, "ability-modals"],
    [/transition|cause|effect|linker/i, "transitions"],
    [/question tag|tag question/i, "question-tags"],
    [/purpose|in order to/i, "purpose-clauses"],
    [/historic present/i, "historic-present"],
    [/zero conditional/i, "zero-conditional"],
    [/imperative|must|rules/i, "imperatives"],
    [/sequencing|adverb/i, "sequencing-adverbs"]

  function topicKeyFor(L) {
    var t = (L && L.title) || "";

  /* ---- Image slots with graceful placeholders (assets/images/<file>) ---- */
  function imgSlot(file, alt, cls, label) {
    return '<div class="ga-img ' + (cls || "") + '" data-image="' + esc(file) + '">' +
      '<img src="assets/images/' + esc(file) + '" alt="' + esc(alt || "") + '" loading="lazy" ' +
      'onload="this.parentNode.classList.add(\'has-img\')" onerror="this.style.display=\'none\'">' +
      '<div class="ga-img-ph" aria-hidden="true"><span class="placeholder-icon">\u2726</span>' +
      '<strong>' + esc(label || alt || file) + '</strong>' +
      '<small>assets/images/' + esc(file) + '</small>' +
      '<small class="ph-msg">Add this image to assets/images/</small></div></div>';
  }
  function chapterImage(title) {
    var t = (title || "").toLowerCase();
    if (/living together/.test(t)) return "chapter-living-together.webp";
    if (/shop till/.test(t)) return "chapter-shop-till-you-drop.webp";
    if (/meeting new people/.test(t)) return "chapter-meeting-new-people.webp";
    if (/come rain/.test(t)) return "chapter-come-rain-or-shine.webp";
    return "chapter-default.webp";
  }

  /* ---- Pathway progress + next-lesson recommendation (real data only) ---- */
  function pathwayLessonIds(pw) { return pw ? pw.chapters.reduce(function (a, c) { return a.concat(c.lessons); }, []) : []; }
  function pathwayCompletion(num, pw) {
    if (!pw) return { done: 0, total: 0, pct: 0 };
    var m = buildStudentModel(num, pw.term, pw.grade, pw.stream);
    var ids = pathwayLessonIds(pw);
    var done = m.completedLessons.filter(function (l) { return ids.indexOf(l) >= 0; }).length;
    return { done: done, total: ids.length, pct: ids.length ? Math.round(done / ids.length * 100) : 0, model: m };
  }
  // First lesson (in chapter order) without a submitted official test.
  function nextLessonIn(num, pw) {
    var ids = pathwayLessonIds(pw);
    for (var i = 0; i < ids.length; i++) {
      var rec = lessonProgress(num, pw.term, ids[i]).rec;
      if (!(rec.official && rec.official.submitted)) return ids[i];
    }
    return null; // pathway fully tested
  }
  // Most recently active pathway for this student, from the store (or null).
  function lastActivePathway(num) {
    var d = store.load(); var st = d.students[num]; if (!st || !st.progress) return null;
    var best = null, bestAt = 0;
    Object.keys(st.progress).forEach(function (term) {
      Object.keys(st.progress[term]).forEach(function (lid) {
        var r = st.progress[term][lid]; var at = 0;
        if (r.practice && r.practice.lastAt) at = Math.max(at, r.practice.lastAt);
        if (r.official && r.official.at) at = Math.max(at, r.official.at);
        if (at > bestAt) {
          var L = GA.registry.lessons[lid];
          if (L && GA.registry.pathways[L._key]) { bestAt = at; best = GA.registry.pathways[L._key]; }
        }
      });
    });
    return best;
  }
  // Rule-based recommendations from the derived model (no invented data).
  function buildRecommendations(num, pw, model) {
    var recs = [];
    var nxt = nextLessonIn(num, pw);
    if (model.weakAreas.length) {
      var w = model.weakAreas.slice().sort(function (a, b) { return a.pct - b.pct; })[0];
      recs.push('Review <strong>' + esc(w.title) + '</strong> (' + w.pct + '%) before taking its mastery test again in practice.');
    }
    if (nxt) {
      var NL = GA.registry.lessons[nxt];
      if (NL) recs.push('Continue with <strong>' + esc(NL.title) + '</strong>.');
    }
    pw.chapters.forEach(function (ch) {
      var remaining = ch.lessons.filter(function (l) { return model.completedLessons.indexOf(l) < 0; });
      if (remaining.length === 1) {
        recs.push('You are one lesson away from completing <strong>' + esc(ch.title) + '</strong>.');
      }
    });
    var bestLid = null, bestPct = -1;
    Object.keys(model.scores).forEach(function (lid) { if (model.scores[lid].pct > bestPct) { bestPct = model.scores[lid].pct; bestLid = lid; } });
    if (bestLid && bestPct >= 80) {
      var BL = GA.registry.lessons[bestLid];
      if (BL) recs.push('Your strongest topic is <strong>' + esc(BL.title) + '</strong> (' + bestPct + '%).');
    }
    if (!recs.length) recs.push('Begin your first lesson to start building your progress record.');
    return recs;
  }
  // Mastery label derived from the EXISTING thresholds (no calculation change):
  // untouched → Not started · <60 → Developing · 60–79 → Secure · ≥80 → Mastered
  function masteryLabel(sc) {
    if (!sc) return "Not started";
    return sc.pct >= 80 ? "Mastered" : sc.pct >= 60 ? "Secure" : "Developing";
  }
  // Lesson node state from real progress (lock state styled but never invented).
  function lessonState(num, term, lid) {
    var rec = lessonProgress(num, term, lid).rec;
    var st = { cls: "", pill: '<span class="pill todo">Not started</span>', practicePct: null, officialPct: null };
    if (rec.practice) { st.practicePct = rec.practice.bestPct; }
    if (rec.official && rec.official.submitted) {
      st.officialPct = rec.official.pct;
      if (rec.official.pct >= 80) { st.cls = "is-mastered"; st.pill = '<span class="pill mastered">Mastered \u2713 ' + rec.official.pct + '%</span>'; }
      else if (rec.official.pct < 60) { st.cls = "is-review"; st.pill = '<span class="pill review">Needs review \u00b7 ' + rec.official.pct + '%</span>'; }
      else { st.cls = "is-official"; st.pill = '<span class="pill locked">Official \u2713 ' + rec.official.pct + '%</span>'; }
    } else if (rec.practice) {
      st.cls = "is-progress";
      st.pill = '<span class="pill practised">Practised ' + rec.practice.bestPct + '%</span>';
      if (rec.practice.bestPct >= 50) { st.cls = "is-official"; st.pill = '<span class="pill official-ready">Ready for mastery test \u00b7 best ' + rec.practice.bestPct + '%</span>'; }
    }
    return st;
  }

  /* ---------- session -------------------------------------------------- */
  var session = { num: null };
  var pick = { term: null, grade: null, stream: null };

  /* ---------- exercise renderers (6 types) ----------------------------- */
  function renderExercise(ex, i) {
    var body = "";
    switch (ex.type) {
      case "mcq":
        body = '<ul class="mcq-list">' + ex.options.map(function (o, j) {
          return '<li class="mcq-item" data-opt="' + j + '"><span class="bub">' + String.fromCharCode(65 + j) + '</span><span>' + esc(o) + '</span></li>';
        }).join("") + '</ul>'; break;
      case "fill":
        body = '<div>' + ex.sentence.replace(/_+/g, '<input class="ans-input" style="display:inline-block;width:160px" data-text>') + '</div>'; break;
      case "transform":
        body = '<input class="ans-input" data-text placeholder="Write your answer…">'; break;
      case "error":
        body = '<div class="given">' + ex.given + '</div><input class="ans-input" data-text placeholder="Write the corrected sentence…">'; break;
      case "reorder":
        body = '<div class="chips" data-bank>' + shuffleBank(ex.bank).map(function (k) {
                 return '<span class="chip" data-w="' + esc(ex.bank[k]) + '" data-k="' + k + '">' + esc(ex.bank[k]) + '</span>';
               }).join("") +
               '</div><div class="drop" data-drop></div>'; break;
      case "match":
        body = '<div class="match-grid"><div class="match-col" data-left>' +
          ex.pairs.map(function (p, j) { return '<div class="match-item" data-l="' + j + '">' + esc(p.l) + '</div>'; }).join("") +
          '</div><div class="match-col" data-right>' +
          shuffleIdx(ex.pairs.length).map(function (j) { return '<div class="match-item" data-r="' + j + '"><span class="let">' + String.fromCharCode(65 + j) + '</span>' + esc(ex.pairs[j].r) + '</div>'; }).join("") +
          '</div></div>'; break;
    }
    return '<div class="exercise" data-ex="' + i + '" data-type="' + ex.type + '">' +
      '<div class="ex-top"><span class="ex-num">' + (i + 1) + '</span>' +
      '<span class="ex-prompt">' + (ex.prompt || "") + '<span class="ex-type">' + ex.type + '</span></span></div>' +
      body + '<div class="explain hide">' + (ex.explain || "") + '</div></div>';
  }
  function shuffleIdx(n) { var a = []; for (var i = 0; i < n; i++) a.push(i); for (var k = a.length - 1; k > 0; k--) { var j = (k * 7 + 3) % (k + 1); var t = a[k]; a[k] = a[j]; a[j] = t; } return a; }
  // Shuffle reorder chips; guarantee the displayed order is NOT the answer order.
  function shuffleBank(bank) {
    var idx = bank.map(function (_, i) { return i; });
    if (idx.length < 2) return idx;
    var orig = bank.join("\u0001");
    for (var t = 0; t < 10; t++) {
      for (var i = idx.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp; }
      if (idx.map(function (k) { return bank[k]; }).join("\u0001") !== orig) break;
    }
    return idx;
  }

  /* ---------- interactive binding ------------------------------------- */
  function bindBank(root, bank, st) {
    bank.forEach(function (ex, i) {
      var node = root.querySelector('.exercise[data-ex="' + i + '"]');
      if (!node) return;
      if (ex.type === "mcq") {
        node.querySelectorAll(".mcq-item").forEach(function (it) {
          it.addEventListener("click", function () {
            if (node.classList.contains("done")) return;
            node.querySelectorAll(".mcq-item").forEach(function (x) { x.classList.remove("selected"); });
            it.classList.add("selected"); st[i].selected = +it.dataset.opt;
          });
        });
      } else if (ex.type === "fill" || ex.type === "transform" || ex.type === "error") {
        var inp = node.querySelector("[data-text]");
        inp.addEventListener("input", function () { st[i].value = inp.value; });
      } else if (ex.type === "reorder") {
        var drop = node.querySelector("[data-drop]"), bankEl = node.querySelector("[data-bank]");
        var sync = function () { st[i].words = Array.prototype.map.call(drop.querySelectorAll(".chip"), function (c) { return c.dataset.w; }); };
        bankEl.addEventListener("click", function (e) { var c = e.target.closest(".chip"); if (!c || node.classList.contains("done")) return; drop.appendChild(c); sync(); });
        drop.addEventListener("click", function (e) { var c = e.target.closest(".chip"); if (!c || node.classList.contains("done")) return; bankEl.appendChild(c); sync(); });
      } else if (ex.type === "match") {
        node.querySelectorAll("[data-l]").forEach(function (lEl) {
          lEl.addEventListener("click", function () {
            if (node.classList.contains("done")) return;
            node.querySelectorAll("[data-l]").forEach(function (x) { x.classList.remove("sel"); });
            lEl.classList.add("sel"); st[i].selectedLeft = +lEl.dataset.l;
          });
        });
        node.querySelectorAll("[data-r]").forEach(function (rEl) {
          rEl.addEventListener("click", function () {
            if (node.classList.contains("done") || st[i].selectedLeft == null) return;
            var lj = st[i].selectedLeft, rj = +rEl.dataset.r;
            st[i].matches[lj] = rj;
            node.querySelector('[data-l="' + lj + '"]').classList.add("paired");
            node.querySelector('[data-l="' + lj + '"]').classList.remove("sel");
            rEl.classList.add("paired"); st[i].selectedLeft = null;
          });
        });
      }
    });
  }

  function gradeBank(root, bank, st, reveal) {
    var correct = 0;
    bank.forEach(function (ex, i) {
      var node = root.querySelector('.exercise[data-ex="' + i + '"]');
      var ok = Grade.check(ex, st[i]); if (ok) correct++;
      node.classList.add("done", ok ? "correct" : "wrong");
      if (ex.type === "mcq") {
        node.querySelectorAll(".mcq-item").forEach(function (it) {
          var j = +it.dataset.opt;
          if (j === ex.answer) it.classList.add("correct");
          else if (j === st[i].selected) it.classList.add("wrong");
        });
      }
      if (reveal) { var ex2 = node.querySelector(".explain"); if (ex2) { ex2.classList.remove("hide"); ex2.classList.add("show"); } }
    });
    return { correct: correct, total: bank.length, pct: bank.length ? Math.round(correct / bank.length * 100) : 0 };
  }

  /* ---------- VIEWS ---------------------------------------------------- */
  var Views = {};

  Views.gate = function () {
    return '<div class="page ultra-narrow">' +
      imgSlot("academy-welcome.webp", "Welcome to Grammar Academy artwork", "", "Welcome artwork") +
      '<div class="eyebrow" style="margin-top:20px">Welcome</div>' +
      '<h1>Enter your student number</h1>' +
      '<p class="section-sub">Your work is saved against your number — not your name. Ask your teacher if you don\'t know it.</p>' +
      '<div class="card"><label class="fld" for="snum">Student number</label>' +
      '<input class="txt" id="snum" inputmode="numeric" placeholder="e.g. 90412" autocomplete="off">' +
      '<div style="margin-top:18px"><button class="btn gold sentence" onclick="GA._enter()">Enter the academy</button></div></div></div>';
  };

  Views.home = function () {
    var terms = Object.keys(GA.registry.terms).sort(function (a, b) {
      var T = GA.registry.terms;
      function num(id) { var L = (T[id] && T[id].label) || id || ""; var m = /Term\s*(\d+)/i.exec(L) || /^T(\d+)/i.exec(id || ""); return m ? parseInt(m[1], 10) : 99; }
      function yr(id) { var L = (T[id] && T[id].label) || ""; var m = /AY\s*([0-9]{4})/i.exec(L); return m ? parseInt(m[1], 10) : 0; }
      return (num(a) - num(b)) || (yr(a) - yr(b));
    });
    if (!terms.length) return '<div class="page"><div class="empty">No data modules registered. Place the <code>ga_data_*.js</code> files next to this HTML file.</div></div>';

    // ---- live context from real progress (no invented data) ----
    var lastPw = lastActivePathway(session.num);
    var comp = lastPw ? pathwayCompletion(session.num, lastPw) : null;
    var nextLid = lastPw ? nextLessonIn(session.num, lastPw) : null;
    var nextL = nextLid ? GA.registry.lessons[nextLid] : null;

    // ---- hero ----
    var heroMeta = lastPw
      ? '<div class="hero-meta"><span class="tag">' + esc(lastPw.streamLabel) + '</span><span class="tag">' + esc(GAMeta.termPhrase(lastPw)) + '</span><span class="tag">' + esc(lastPw.cefr) + '</span></div>'
      : '';
    var heroActions = lastPw
      ? '<button class="btn gold sentence" onclick="GA._continueJourney()">Continue my journey</button>' +
        '<button class="btn ghost sentence" style="border-color:rgba(255,255,255,.4);color:var(--ivory)" onclick="GA._exploreLessons()">Explore lessons</button>'
      : '<button class="btn gold sentence" onclick="document.getElementById(\'termCards\').scrollIntoView({behavior:\'smooth\'})">Begin your first lesson</button>';
    var heroProgress = (comp && comp.total)
      ? '<div class="hero-progress"><span>Overall progress</span><div class="hero-bar"><i style="width:' + comp.pct + '%"></i></div><strong>' + comp.pct + '%</strong><span style="opacity:.7">\u00b7 next milestone: ' + (nextL ? esc(nextL.title) : 'pathway complete') + '</span></div>'
      : '';
    var hero =
      '<section class="hero" aria-label="Academy overview">' +
        imgSlot("grammar-academy-hero.webp", "Grammar Academy hero artwork", "hero-art", "Hero artwork") +
        '<div class="hero-inner"><div class="eyebrow">Grammar Academy</div>' +
        '<h1>Master grammar. Unlock your potential.</h1>' +
        '<p>Hello, scholar ' + esc(session.num) + '. Learn the rule, practise with confidence, complete the mastery test, and earn academy honours.</p>' +
        heroMeta + '<div class="hero-actions">' + heroActions + '</div>' + heroProgress + '</div></section>';

    // ---- continue-learning card ----
    var cont = "";
    if (lastPw && nextL) {
      var nstate = lessonState(session.num, lastPw.term, nextLid);
      var started = nstate.practicePct !== null;
      cont = '<div class="continue-card"><span class="cc-icon">' + topicIcon(nextL, 32, "sky") + '</span>' +
        '<div class="cc-body"><div class="cc-kicker">' + (started ? "Continue learning" : "Next recommended lesson") + '</div>' +
        '<h3>' + esc(nextL.title) + '</h3>' +
        '<div class="cc-sub">' + esc(nextL.chapter) + ' \u00b7 ' + esc(lastPw.streamLabel) +
        (nstate.practicePct !== null ? ' \u00b7 best practice ' + nstate.practicePct + '%' : '') +
        ' \u00b7 15 practice + 15 mastery-test questions</div></div>' +
        '<button class="btn sentence" onclick="GA._resumeLesson(\'' + esc(lastPw.term) + '\',\'' + esc(lastPw.grade) + '\',\'' + esc(lastPw.stream) + '\',\'' + nextLid + '\')">' + (started ? "Continue lesson" : "Start lesson") + '</button></div>';
    } else if (lastPw && !nextL) {
      cont = '<div class="continue-card"><span class="cc-icon" style="background:var(--accent-emerald-soft);color:var(--accent-emerald)">\u2713</span>' +
        '<div class="cc-body"><div class="cc-kicker" style="color:var(--accent-emerald)">Pathway complete</div>' +
        '<h3>' + esc(lastPw.streamLabel) + '</h3><div class="cc-sub">Every mastery test in this pathway has been submitted. Review lessons any time, or explore another term.</div></div>' +
        '<button class="btn ghost sentence" onclick="GA._exploreLessons()">Review lessons</button></div>';
    }

    // ---- progress summary (only when real activity exists) ----
    var summary = "";
    if (comp && comp.model && Object.keys(comp.model.scores).length) {
      var m = comp.model;
      summary = '<div class="summary-row">' +
        '<div class="sum-chip c-emerald"><div class="sc-val">' + comp.done + '<span style="font-size:.55em;color:var(--muted)">/' + comp.total + '</span></div><div class="sc-label">Lessons completed</div></div>' +
        '<div class="sum-chip c-sky"><div class="sc-val">' + (m.avg || 0) + '%</div><div class="sc-label">Overall mastery</div></div>' +
        '<div class="sum-chip c-violet"><div class="sc-val">' + m.badges.length + '<span style="font-size:.55em;color:var(--muted)">/' + BADGES.length + '</span></div><div class="sc-label">Badges earned</div></div>' +
        '<div class="sum-chip c-coral"><div class="sc-val">' + m.weakAreas.length + '</div><div class="sc-label">Topics to review</div></div>' +
        '</div>';
    }

    // ---- term / pathway cards ----
    var cards = terms.map(function (t) {
      var pw = Object.keys(GA.registry.pathways).filter(function (k) { return GA.registry.pathways[k].term === t; });
      return '<div class="card lift" role="button" tabindex="0" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();GA._setTerm(\'' + t + '\')}" onclick="GA._setTerm(\'' + t + '\')"><div class="eyebrow">Term</div>' +
        '<h3>' + esc(GA.registry.terms[t].label) + '</h3>' +
        '<div class="score-line">' + pw.length + ' grade \u00b7 stream pathway' + (pw.length === 1 ? "" : "s") + ' available</div>' +
        '<div style="margin-top:14px"><button class="btn ghost small sentence" onclick="event.stopPropagation();GA._setTerm(\'' + t + '\')">Open term</button></div></div>';
    }).join("");

    return '<div class="page">' + hero + cont + summary +
      '<div id="termCards"><div class="eyebrow">Available pathways</div><h2 style="margin-bottom:14px">Choose your term</h2>' +
      '<div class="grid cols-3">' + cards + '</div></div></div>';
  };

  // Continue-journey actions (home overview)
  GA._resumeLesson = function (term, grade, stream, lid) {
    pick.term = term; pick.grade = grade; pick.stream = stream;
    GA._openLesson(lid);
  };
  GA._continueJourney = function () {
    var pw = lastActivePathway(session.num); if (!pw) { GA.go("#home"); return; }
    var nxt = nextLessonIn(session.num, pw);
    pick.term = pw.term; pick.grade = pw.grade; pick.stream = pw.stream;
    if (nxt) GA._openLesson(nxt); else GA.go("#lessons");
  };
  GA._exploreLessons = function () {
    var pw = lastActivePathway(session.num); if (!pw) { GA.go("#home"); return; }
    pick.term = pw.term; pick.grade = pw.grade; pick.stream = pw.stream;
    GA.go("#lessons");
  };

  Views.streams = function () {
    var t = pick.term;
    var paths = Object.keys(GA.registry.pathways).map(function (k) { return GA.registry.pathways[k]; })
      .filter(function (p) { return p.term === t; });
    // group by grade
    var byGrade = {};
    paths.forEach(function (p) { (byGrade[p.grade] = byGrade[p.grade] || []).push(p); });
    // accent palette (theme-matching) cycled per card; stream order: advanced (left) -> general (right)
    var ACC = ["sky", "teal", "emerald", "amber", "violet", "coral"], _ai = 0;
    function _srank(p) { var s = (p.stream || "").toLowerCase(); return s.indexOf("advanced") > -1 ? 0 : (s.indexOf("general") > -1 ? 2 : 1); }
    var blocks = Object.keys(byGrade).sort(function (a, b) {
      return String(a).localeCompare(String(b), undefined, { numeric: true });
    }).map(function (g) {
      var row = byGrade[g].slice().sort(function (a, b) {
        return (_srank(a) - _srank(b)) || String(a.streamLabel).localeCompare(String(b.streamLabel));
      });
      var cards = row.map(function (p) {
        var n = p.chapters.reduce(function (a, c) { return a + c.lessons.length; }, 0);
        var comp = pathwayCompletion(session.num, p);
        var ac = ACC[_ai++ % ACC.length];
        var src = (p.source || "").split(/\.\s/)[0].trim();   // first sentence only — keep cards simple
        return '<div class="card lift pathway-card" style="border-top:3px solid var(--accent-' + ac + ')" role="button" tabindex="0" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();GA._setStream(\'' + p.grade + '\',\'' + p.stream + '\')}" onclick="GA._setStream(\'' + p.grade + '\',\'' + p.stream + '\')">' +
          '<div class="eyebrow" style="color:var(--accent-' + ac + ')">' + esc(p.cefr) + '</div><h3>' + esc(p.streamLabel) + '</h3>' +
          '<div class="pc-row"><span class="tag">Grade ' + esc(p.grade) + '</span><span class="tag">' + esc(GAMeta.termShort(p)) + '</span><span class="tag">' + p.chapters.length + ' chapter' + (p.chapters.length === 1 ? "" : "s") + '</span><span class="tag">' + n + ' lesson' + (n === 1 ? "" : "s") + '</span></div>' +
          (src ? '<p style="margin:8px 0 0;font-size:.92rem">' + esc(src) + '</p>' : '') +
          '<div class="pc-bar" role="progressbar" aria-valuenow="' + comp.pct + '" aria-valuemin="0" aria-valuemax="100" aria-label="Pathway completion"><i style="width:' + comp.pct + '%;background:var(--accent-' + ac + ')"></i></div>' +
          '<div class="pc-row"><span>' + comp.done + ' of ' + comp.total + ' lessons completed \u00b7 ' + comp.pct + '%</span></div>' +
          '<div class="pc-actions"><button class="btn sentence small" onclick="event.stopPropagation();GA._setStream(\'' + p.grade + '\',\'' + p.stream + '\')">Open pathway</button></div></div>';
      }).join("");
      return '<h2 style="margin:26px 0 14px">Grade ' + esc(g) + '</h2><div class="grid cols-2">' + cards + '</div>';
    }).join("");
    return '<div class="page"><div class="crumb"><a onclick="GA.go(\'#home\')">Terms</a><span class="sep">›</span>' +
      esc(GA.registry.terms[t].label) + '</div>' +
      imgSlot("academy-library-background.webp", "Academy library artwork", "", "Library artwork") +
      '<div class="eyebrow" style="margin-top:20px">Choose grade &amp; stream</div>' +

  /* ---------- live bank mounting (practice + official) ----------------- */
  var live = { lid: null, bank: null, st: null, kind: null };

  /* ---- answered counter for the live meter (display only, no grading change) ---- */
  function answeredCount(bank, st) {
    var n = 0;
    bank.forEach(function (ex, i) {
      var s = st[i] || {};
      switch (ex.type) {
        case "mcq": if (s.selected !== null && s.selected !== undefined) n++; break;
        case "fill": case "transform": case "error": if ((s.value || "").trim()) n++; break;
        case "reorder": if ((s.words || []).length) n++; break;
        case "match": if (s.matches && Object.keys(s.matches).length >= ex.pairs.length) n++; break;
      }
    });
    return n;
  }
  function meterHtml(kind, total) {
    return '<div class="bank-meter' + (kind === "official" ? " official-meter" : "") + '" aria-live="polite">' +
      '<span class="bm-count" data-bm-count>0 of ' + total + ' answered</span>' +
      '<div class="bm-bar"><i data-bm-fill style="width:0%"></i></div>' +
      '<span>' + (kind === "official" ? "Official mastery test" : "Practice") + '</span></div>';
  }
  function attachMeter(host, bank, st) {
    var update = function () {
      var n = answeredCount(bank, st);
      var c = host.querySelector("[data-bm-count]"); if (c) c.textContent = n + " of " + bank.length + " answered";
      var f = host.querySelector("[data-bm-fill]"); if (f) f.style.width = Math.round(n / bank.length * 100) + "%";
    };
    host.addEventListener("click", function () { setTimeout(update, 0); });
    host.addEventListener("input", function () { setTimeout(update, 0); });
    update();
  }

  function mountPractice(lid) {
    var L = GA.registry.lessons[lid];
    var host = el("bankHost"); if (!host) return;
    live = { lid: lid, kind: "practice", bank: L.practice, st: L.practice.map(Grade.blank) };
    host.innerHTML = meterHtml("practice", L.practice.length) + L.practice.map(renderExercise).join("");
    bindBank(host, L.practice, live.st);
    attachMeter(host, L.practice, live.st);
  }

  function mountOfficial(lid) {
    var L = GA.registry.lessons[lid];
    var host = el("bankHost"); if (!host) return;
    var pr = lessonProgress(session.num, pick.term, lid).rec;

    if (pr.official && pr.official.submitted) {
      // LOCKED — one-submission decision #1: render result, no inputs, no resubmit.
      host.innerHTML =
        '<div class="banner lock"><div class="big">' + pr.official.pct + '%</div>' +
        '<div><strong>Official test already submitted.</strong><br>' +
        'Score ' + pr.official.correct + ' / ' + pr.official.total + ' · submitted ' + fmtDate(pr.official.at) +
        '. This result is final and cannot be retaken.</div></div>' +
        imgSlot("assessment-complete.webp", "Assessment complete artwork", "empty-state-img", "Assessment complete") +
        L.official.map(function (ex, i) {
          var node = renderExercise(ex, i);
          return node;
        }).join("");
      // replay stored answers + lock
      var stored = pr.official.answers || L.official.map(Grade.blank);
      bindBankReadonly(host, L.official, stored);
      gradeBank(host, L.official, stored, true);
      return;
    }

    live = { lid: lid, kind: "official", bank: L.official, st: L.official.map(Grade.blank) };
    host.innerHTML =
      '<div class="banner official"><div><strong>Official mastery test \u00b7 ' + L.official.length + ' questions.</strong> You may submit it <u>once only</u>. ' +
      'There are no retries, so use the Practice stage first. When you submit, your score is recorded and locked.</div></div>' +
      meterHtml("official", L.official.length) +
      L.official.map(renderExercise).join("") +
      '<div style="margin-top:6px"><button class="btn gold sentence" onclick="GA._submitOfficial(\'' + lid + '\')">Submit official test — final</button></div>';
    bindBank(host, L.official, live.st);
    attachMeter(host, L.official, live.st);
  }

  function bindBankReadonly(root, bank, st) {
    bank.forEach(function (ex, i) {
      var node = root.querySelector('.exercise[data-ex="' + i + '"]');
      if (!node) return;
      if (ex.type === "fill" || ex.type === "transform" || ex.type === "error") {
        var inp = node.querySelector("[data-text]"); if (inp) { inp.value = st[i].value || ""; inp.disabled = true; }
      } else if (ex.type === "reorder") {
        var drop = node.querySelector("[data-drop]"), bankEl = node.querySelector("[data-bank]");
        (st[i].words || []).forEach(function (w) {
          var chip = bankEl.querySelector('.chip[data-w="' + w + '"]'); if (chip) drop.appendChild(chip);
        });
      }
    });
  }

  /* ---------- public actions ------------------------------------------ */
  GA._enter = function () {
    var v = (el("snum").value || "").trim();
    if (!/^\d{2,}$/.test(v)) { el("snum").focus(); el("snum").style.borderColor = "var(--error)"; return; }
    session.num = v; GA.go("#home");

  GA._setTerm = function (t) { pick.term = t; pick.grade = null; pick.stream = null; GA.go("#streams"); };
  GA._setStream = function (g, s) { pick.grade = g; pick.stream = s; GA.go("#lessons"); };
  GA._openLesson = function (lid, tab) { GA._lid = lid; GA._tab = tab || "learn"; GA.go("#lesson"); };

  GA._checkPractice = function (lid) {
    if (live.kind !== "practice" || live.lid !== lid) return;
    var host = el("bankHost");
    var res = gradeBank(host, live.bank, live.st, true);
    var lp = lessonProgress(session.num, pick.term, lid);
    var prev = lp.rec.practice ? lp.rec.practice.bestPct : 0;
    lp.rec.practice = { bestPct: Math.max(prev, res.pct), lastPct: res.pct, attempts: (lp.rec.practice ? lp.rec.practice.attempts : 0) + 1, lastAt: Date.now() };
    store.save(lp.d);
    if (GA.cloud && GA.cloud.enabled()) GA.cloud.queueProgress(pick.term, lid, lp.rec.practice, lp.rec.official);
  };

  GA._submitOfficial = function (lid) {
    if (live.kind !== "official" || live.lid !== lid) return;
    // Confirmation before final submission (one-submission logic unchanged).
    var unanswered = live.bank.length - answeredCount(live.bank, live.st);
    var msg = unanswered > 0
      ? "You still have " + unanswered + " unanswered question" + (unanswered === 1 ? "" : "s") + ".\n\nSubmit the official test anyway? This is final and cannot be retaken."
      : "Submit the official test now?\n\nThis is final and cannot be retaken.";
    if (!window.confirm(msg)) return;
    var host = el("bankHost");
    var res = gradeBank(host, live.bank, live.st, true);
    var lp = lessonProgress(session.num, pick.term, lid);
    // one-submission lock — write immutable record
    lp.rec.official = { submitted: true, correct: res.correct, total: res.total, pct: res.pct, at: Date.now(), answers: live.st };
    store.save(lp.d);
    if (GA.cloud && GA.cloud.enabled()) GA.cloud.queueProgress(pick.term, lid, lp.rec.practice, lp.rec.official);
    // freeze UI immediately
    host.querySelectorAll(".exercise").forEach(function (n) { n.classList.add("done"); });
    var meter = host.querySelector(".bank-meter"); if (meter) meter.remove();
    var existing = host.querySelector(".banner");
    if (existing) existing.outerHTML =
      '<div class="banner lock"><div class="big">' + res.pct + '%</div><div><strong>Submitted and locked.</strong><br>Score ' +
      res.correct + ' / ' + res.total + '. This result is final.</div></div>';
    var btn = host.querySelector(".btn.gold"); if (btn) btn.remove();
  };

  /* ====================================================================
     STUDENT PROGRESS LAYER (ported from monolith, rewired to the registry
     + term-aware store). Badges/dashboard read a derived student model so
     the original criteria port unchanged. PASS=50, weak<60 preserved.
     ==================================================================== */
  var BADGES = [
    { id:"first_step",    name:"First Step",    tier:"bronze",  req:"Complete 1 lesson",      check:function(s){return s.completedLessons.length>=1;} },
    { id:"apprentice",    name:"Apprentice",    tier:"bronze",  req:"Complete 3 lessons",     check:function(s){return s.completedLessons.length>=3;} },
    { id:"scholar",       name:"Scholar",       tier:"silver",  req:"Complete 5 lessons",     check:function(s){return s.completedLessons.length>=5;} },
    { id:"perfect_round", name:"Perfect Round", tier:"silver",  req:"Score 100% on a lesson", check:function(s){return Object.keys(s.scores).some(function(k){return s.scores[k].pct===100;});} },
    { id:"chapter_master",name:"Chapter Master",tier:"gold",    req:"Finish a whole chapter", check:function(s){return s.chapterMaster;} },
    { id:"laureate",      name:"Laureate",      tier:"gold",    req:"Complete 8 lessons",     check:function(s){return s.completedLessons.length>=8;} },
    { id:"academy_elite", name:"Academy Elite", tier:"diamond", req:"Complete entire pathway",check:function(s){return s.pathwayMaster;} }
  ];

  // Derive a monolith-shaped student model for one pathway from store + registry.
  // Per-lesson score = official.pct (if submitted) else practice.bestPct (if practised) else none.
  function buildStudentModel(num, term, grade, stream) {
    var pw = GA.registry.pathways[pkey(term, grade, stream)];
    var model = { id:num, grade:grade, term:term, scores:{}, completedLessons:[], weakAreas:[], badges:[], chapterMaster:false, pathwayMaster:false, avg:0 };
    if (!pw) return model;
    var d = store.load();
    var prog = (d.students[num] && d.students[num].progress && d.students[num].progress[term]) || {};
    var allLessons = pw.chapters.reduce(function (a, c) { return a.concat(c.lessons); }, []);
    var pcts = [];
    allLessons.forEach(function (lid) {
      var rec = prog[lid]; if (!rec) return;
      var pct = null, attempts = 0, official = false;
      if (rec.official && rec.official.submitted) { pct = rec.official.pct; attempts = 1; official = true; }
      else if (rec.practice) { pct = rec.practice.bestPct; attempts = rec.practice.attempts || 1; }
      if (pct === null) return;
      model.scores[lid] = { pct: pct, attempts: attempts, official: official };
      pcts.push(pct);
      if (pct >= 50) model.completedLessons.push(lid);
      if (pct < 60) { var L = GA.registry.lessons[lid]; model.weakAreas.push({ id: lid, code: L ? L.code : "", title: L ? L.title : lid, pct: pct }); }
    });
    model.avg = pcts.length ? Math.round(pcts.reduce(function (a, b) { return a + b; }, 0) / pcts.length) : 0;
    model.chapterMaster = pw.chapters.some(function (ch) { return ch.lessons.length > 0 && ch.lessons.every(function (l) { return model.completedLessons.indexOf(l) >= 0; }); });
    model.pathwayMaster = allLessons.length > 0 && allLessons.every(function (l) { return model.completedLessons.indexOf(l) >= 0; });
    model.badges = BADGES.filter(function (b) { return b.check(model); }).map(function (b) { return b.id; });
    return model;
  }
  GA._buildStudentModel = buildStudentModel; // expose for tests
  function masteryBand(pct) { return pct >= 80 ? "strong" : pct >= 60 ? "fair" : "weak"; }
  function statCard(label, value, sub) {
    return '<div class="stat-card"><div class="stat-accent"></div><div class="stat-label">' + esc(label) + '</div><div class="stat-value">' + value + '</div><div class="stat-sub">' + esc(sub) + '</div></div>';
  }

  Views.dashboard = function () {
    if (!(pick.term && pick.stream)) return Views.home();
    var pw = GA.registry.pathways[pkey(pick.term, pick.grade, pick.stream)];
    if (!pw) return Views.home();
    var s = buildStudentModel(session.num, pick.term, pick.grade, pick.stream);
    var allLessons = pw.chapters.reduce(function (a, c) { return a.concat(c.lessons); }, []);
    var earned = s.badges.length;
    var attempted = Object.keys(s.scores).length;
    var compPct = allLessons.length ? Math.round(s.completedLessons.length / allLessons.length * 100) : 0;

    var banner = '<div class="t-banner" style="background:var(--navy-700)">' +
      imgSlot("student-dashboard-banner.webp", "Student dashboard banner artwork", "", "Dashboard banner") +
      '<div class="tb-text"><div class="eyebrow">' + esc(pw.cefr) + ' \u00b7 ' + esc(GAMeta.termPhrase(pw)) + '</div>' +
      '<h1>My progress \u00b7 Scholar ' + esc(session.num) + '</h1></div></div>';

    // Progress ring (SVG radial)
    var R = 52, C = Math.round(2 * Math.PI * R);
    var ring = '<div class="ring ring-label" role="img" aria-label="Pathway completion ' + compPct + ' percent">' +

  // Derived progress toward each badge (display only — requirements unchanged).

    var reqMap = { first_step: 1, apprentice: 3, scholar: 5, laureate: 8 };

    if (b.id === "perfect_round") {
      var best = 0; Object.keys(s.scores).forEach(function (k) { best = Math.max(best, s.scores[k].pct); });
      return Math.min(1, best / 100);
    }
    return b.check(s) ? 1 : 0; // chapter/pathway: binary
  }

  /* ====================================================================

  var TEACHER_ACCESS_CODE = "UAEMOE-2026";
  var TID = "local-teacher"; // single teacher context on this device

  // TeacherNotes — private per-student labels (ported verbatim). Never shown to students.
  var TeacherNotes = (function () {
    var KEY = "mm_grammar_teacher_notes", MAX = 80;
    function _read() { try { var o = JSON.parse(localStorage.getItem(KEY)); return (o && typeof o === "object") ? o : {}; } catch (_) { return {}; } }
    function _write(o) { try { localStorage.setItem(KEY, JSON.stringify(o)); } catch (_) {} }
    return {
      get: function (t, s) { if (!t || !s) return ""; var a = _read(); return (a[t] && a[t][s]) || ""; },
      set: function (t, s, label) {
        if (!t || !s) return; var a = _read(); if (!a[t]) a[t] = {};
        var v = String(label || "").trim().slice(0, MAX);
        if (!v) delete a[t][s]; else a[t][s] = v;

  // Grammar families (ported) — cluster related grammar codes for intervention.
  var GRAMMAR_FAMILIES = {
    "Conditionals": ["G.5"], "Passives": ["G.10","G.8.3"], "Modals": ["G.8"], "Questions": ["G.17"],
    "Past Tenses": ["G.14"], "Present Tenses": ["G.13"], "Future Tenses": ["G.15"], "Reported Speech": ["G.18"],
    "Relative Clauses": ["G.4"], "Adjectives & Adverbs": ["G.1","G.2"], "Prepositions": ["G.12"],
    "Determiners": ["G.7"], "Verb Forms": ["G.19"], "Causatives": ["G.3"], "Noun Phrases": ["G.9"],
    "Inversion & Emphasis": ["G.S9"], "Clefts": ["G.S9.3","G.S9.4"]
  };
  function familyFor(code) {
    if (!code) return "Other";
    var root = code.split(".").slice(0, 2).join(".");
    for (var fam in GRAMMAR_FAMILIES) {
      if (GRAMMAR_FAMILIES[fam].some(function (c) { return code === c || root === c || code.indexOf(c + ".") === 0 || c.indexOf(root) === 0; })) return fam;
    }
    return "Other";
  }
  // Intervention groups: cluster students sharing weak lessons/families (2+ threshold).
  function computeInterventionGroups(models) {
    if (!models || !models.length) return [];
    var byLesson = {}, byFamily = {};
    models.forEach(function (m) {
      var weak = {};
      m.weakAreas.forEach(function (w) { weak[w.id] = 1; });
      Object.keys(weak).forEach(function (lid) {
        var L = GA.registry.lessons[lid]; if (!L) return;
        (byLesson[lid] = byLesson[lid] || {})[m.id] = 1;
        var fam = familyFor(L.code); if (fam === "Other") return;
        if (!byFamily[fam]) byFamily[fam] = { nicks: {}, codes: {} };
        byFamily[fam].nicks[m.id] = 1; byFamily[fam].codes[L.code] = 1;
      });
    });
    var groups = [];
    Object.keys(byFamily).forEach(function (fam) {
      var nicks = Object.keys(byFamily[fam].nicks);
      if (nicks.length >= 2) groups.push({ kind: "family", topic: fam, students: nicks.sort(), members: Object.keys(byFamily[fam].codes).sort() });
    });
    Object.keys(byLesson).forEach(function (lid) {
      var nicks = Object.keys(byLesson[lid]); var L = GA.registry.lessons[lid];
      if (nicks.length >= 2) groups.push({ kind: "lesson", topic: L.code + " — " + L.title, students: nicks.sort(), members: [] });
    });
    groups.sort(function (a, b) {
      if (b.students.length !== a.students.length) return b.students.length - a.students.length;
      if (a.kind !== b.kind) return a.kind === "family" ? -1 : 1;
      return a.topic.localeCompare(b.topic);
    });
    return groups;
  }

  var teacher = { authed: false, term: null, grade: null, stream: null };

  // Build the roster (student models + last activity + note) for one pathway.
  function rosterFor(term, grade, stream) {
    var pw = GA.registry.pathways[pkey(term, grade, stream)]; if (!pw) return [];
    var d = store.load(); var out = [];
    Object.keys(d.students || {}).forEach(function (num) {
      var m = buildStudentModel(num, term, grade, stream);
      if (!Object.keys(m.scores).length) return; // only students active in this pathway
      var prog = (d.students[num].progress && d.students[num].progress[term]) || {};
      var last = 0;
      Object.keys(prog).forEach(function (lid) {
        var r = prog[lid]; if (r.official && r.official.at) last = Math.max(last, r.official.at);
        if (r.practice && r.practice.lastAt) last = Math.max(last, r.practice.lastAt);
      });
      out.push({ num: num, model: m, last: last, note: TeacherNotes.get(TID, num) });
    });
    return out.sort(function (a, b) { return a.num.localeCompare(b.num, undefined, { numeric: true }); });
  }

    if (!(teacher.term && teacher.stream)) {

    var rows = roster.length ? roster.map(function (r) {

    }).join("") : '<tr><td colspan="7" class="empty" style="padding:30px">No students have worked on this pathway yet.</td></tr>';

    var rosterCard = '<h3 style="margin:18px 0 10px">Roster <span style="color:var(--muted);font-weight:normal">(' + roster.length + ')</span>' +
      (roster.length ? ' <button class="btn ghost small" style="margin-left:10px" onclick="GA._batchReports()">Print all reports</button>' : '') + ' <button class="btn ghost small" onclick="GA._teacherWorksheets()">Worksheets</button></h3>' +
      '<div class="card" style="padding:0;overflow:auto"><table class="student-list">' +
      '<tr><th>Student #</th><th>Private label</th><th>Completed</th><th>Average</th><th>Weak</th><th>Last active</th><th>Report</th></tr>' + rows + '</table></div>';

    var groups = computeInterventionGroups(roster.map(function (r) { return r.model; }));
    var interv = groups.length
      ? '<ul class="intervention-list">' + groups.map(function (g) {

            '<div class="group-tags">' + (g.kind === "family" ? "Grammar family" : "Lesson") + ' · students: ' + g.students.map(esc).join(", ") + '</div></div>' +
            '<span class="group-count">' + g.students.length + '</span></li>';

    var intervCard = '<h3 style="margin:28px 0 10px">Suggested intervention groups</h3><div class="card">' + interv + '</div>';

    return head + rosterCard + intervCard + '</div>';
  };

  /* ====================================================================
     REPORTS (ported from monolith → registry/store). School branding
     removed per brand rule. Comment/Arabic/recommendations generators
     ported verbatim; report sheet rewired to the adapter.
     ==================================================================== */
  var PERF_BANDS = [
    { min: 90, key: "excellent",  label: "Excellent",     tone: "outstanding command of this term's grammar" },
    { min: 75, key: "strong",     label: "Strong",        tone: "confident and dependable progress" },
    { min: 60, key: "developing", label: "Developing",    tone: "steady development of the core structures" },
    { min: 0,  key: "support",    label: "Needs Support", tone: "the early foundations of this term's work" }
  ];
  function perfBand(pct) { var v = Number(pct) || 0; return PERF_BANDS.find(function (b) { return v >= b.min; }) || PERF_BANDS[PERF_BANDS.length - 1]; }
  function cefrForReport(baseCefr, avgPct) {
    var base = baseCefr || "—";
    if (avgPct == null) return base;
    var k = perfBand(avgPct).key;
    var tag = k === "excellent" ? "mastery" : k === "strong" ? "secure" : k === "developing" ? "approaching" : "emerging";
    return base + " · " + tag;
  }
  function engagementLevel(attemptCount, totalLessons) {
    if (!totalLessons) return { key: "low", label: "Low participation" };
    var r = attemptCount / totalLessons;
    if (r >= 0.6) return { key: "active", label: "Active participation" };
    if (r >= 0.25) return { key: "moderate", label: "Moderate participation" };
    return { key: "low", label: "Low participation" };
  }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // Report signature — school omitted by rule; name/title overridable via localStorage.
  function signatureFor() {
    var s = {}; try { s = JSON.parse(localStorage.getItem("mm_grammar_report_signature")) || {}; } catch (_) {}
    return { name: s.name || "Class Teacher", title: s.title || "English Teacher", school: s.school || "" };
  }

  /* ====================================================================
     ReportEdits — per-student manual report overrides. When a teacher
     edits a report inline and saves, the full edited sheet markup is
     stored here (keyed by pathway + student number). renderReportSheet
     returns the saved version when present; "Reset to auto" clears it
     and the report rebuilds from live progress. Local to this device.
     ==================================================================== */
  var ReportEdits = (function () {
    var KEY = "mm_grammar_report_overrides";
    function read() { try { var o = JSON.parse(localStorage.getItem(KEY)); return (o && typeof o === "object") ? o : {}; } catch (_) { return {}; } }
    function write(o) { try { localStorage.setItem(KEY, JSON.stringify(o)); } catch (_) {} }
    function k(t, g, s, n) { return t + "|" + g + "|" + s + "|" + n; }
    return {
      get: function (t, g, s, n) { var a = read(); return a[k(t, g, s, n)] || null; },
      set: function (t, g, s, n, html) { var a = read(); a[k(t, g, s, n)] = { html: html, at: Date.now() }; write(a); },
      clear: function (t, g, s, n) { var a = read(); delete a[k(t, g, s, n)]; write(a); }

  function computeReportData(num, term, grade, stream) {
    var pw = GA.registry.pathways[pkey(term, grade, stream)];
    if (!pw) return null;
    var m = buildStudentModel(num, term, grade, stream);
    var allIds = pw.chapters.reduce(function (a, c) { return a.concat(c.lessons); }, []);
    var total = allIds.length;
    var attempted = allIds.filter(function (l) { return m.scores[l]; }).map(function (l) {
      var L = GA.registry.lessons[l] || {};
      return { lid: l, code: L.code || "—", title: L.title || l, pct: m.scores[l].pct || 0, attempts: m.scores[l].attempts || 1 };
    });
    var vals = attempted.map(function (x) { return x.pct; });
    var avg = vals.length ? Math.round(vals.reduce(function (a, b) { return a + b; }, 0) / vals.length) : 0;
    var mastered = attempted.filter(function (x) { return x.pct >= 80; }).sort(function (a, b) { return b.pct - a.pct; });
    var weak = attempted.filter(function (x) { return x.pct < 60; }).sort(function (a, b) { return a.pct - b.pct; });
    var fair = attempted.filter(function (x) { return x.pct >= 60 && x.pct < 80; });
    var completionPct = total ? Math.round(m.completedLessons.filter(function (l) { return allIds.indexOf(l) >= 0; }).length / total * 100) : 0;
    var TYPE_LABEL = { mcq: "Multiple choice", fill: "Fill in the blank", transform: "Transformation", error: "Error correction", reorder: "Sentence ordering", match: "Matching" };
    var ts = {};
    attempted.forEach(function (it) {
      var L = GA.registry.lessons[it.lid]; if (!L) return;
      (L.practice || []).concat(L.official || []).forEach(function (ex) {
        var k = ex.type; if (!TYPE_LABEL[k]) return;
        if (!ts[k]) ts[k] = { sum: 0, weight: 0, count: 0 };
        ts[k].count++; ts[k].sum += it.pct; ts[k].weight++;
      });
    });
    var skills = Object.keys(TYPE_LABEL).map(function (k) { var st = ts[k]; return { key: k, label: TYPE_LABEL[k], pct: st && st.weight ? Math.round(st.sum / st.weight) : null, count: st ? st.count : 0 }; });
    return {
      grade: { label: pw.streamLabel, cefr: pw.cefr }, totalLessons: total, attempted: attempted, avg: avg,
      band: perfBand(avg), completionPct: completionPct, mastered: mastered, fair: fair, weak: weak, skills: skills,
      earnedBadges: BADGES.filter(function (b) { return b.check(m); }), allBadgesCount: BADGES.length,
      engagement: engagementLevel(attempted.length, total), cefr: cefrForReport(pw.cefr, avg), reportDate: new Date(),
      // Dynamic term metadata (single source: GAMeta) — no hardcoded term/AY anywhere downstream.
      termPhrase: GAMeta.termPhrase(pw), termShort: GAMeta.termShort(pw),
      ayPhrase: GAMeta.ayPhrase(pw), arabicTerm: GAMeta.arabicTerm(pw)
    };
  }

    var they = "they", their = "their", them = "them";

      strong: name + " is making " + rep.band.tone + " through the " + rep.termShort + " programme, showing reliable understanding across most topic areas.",

      support: name + " is at " + rep.band.tone + ". Extra practice at home and focused support in class will help " + them + " build momentum."
    };
    var opening = openings[rep.band.key], strength = "", growth = "", footer = "";
    if (rep.mastered.length >= 2) strength = "Particular strengths include <em>" + esc(rep.mastered[0].title) + "</em> and <em>" + esc(rep.mastered[1].title) + "</em>, where " + they + " have achieved consistent accuracy.";
    else if (rep.mastered.length === 1) strength = "A notable strength is <em>" + esc(rep.mastered[0].title) + "</em>, where " + they + " have shown secure understanding.";

    else if (rep.weak.length === 1) growth = "A clear next step is to revisit <em>" + esc(rep.weak[0].title) + "</em>, where accuracy is still developing.";
    else if (rep.attempted.length === 0) growth = cap(they) + " are encouraged to begin the pathway so progress can be tracked and supported.";
    else growth = "At this stage I recommend extending " + their + " practice across the remaining chapter to consolidate everything learned so far.";

  /* ====================================================================

       #entrance        → two entrance cards (Teacher left · Student right)
                          plus a remembered-user return card
       #access-student  → student access screen (username + code only)
       #access-teacher  → teacher access screen (login / signup / forgot)

     (session.num) so all progress/reports/roster logic is unchanged.
     Teacher login/signup sets teacher.authed and feeds the report &
     certificate signature. The legacy access code remains a dev fallback.
     Remembered users are stored as NON-SENSITIVE profile only (never a
     password). Cloud-ready stubs live in GA.auth.* and GA.*.
     REQUIRED IMAGES: assets/teacher-entrance.png · assets/student-entrance.png
     ==================================================================== */
  function setEntryMode(on) { document.body.classList[on ? "add" : "remove"]("on-entry"); }

  /* ---------- remembered user (non-sensitive only) -------------------- */
  var REMEMBER_KEY = "mm_grammar_remembered_user";
  function rememberUser(p) {
    if (!p || !p.role) return;
    try { p.lastAccessedAt = new Date().toISOString(); localStorage.setItem(REMEMBER_KEY, JSON.stringify(p)); } catch (_) {}
    GA._dismissReturn = false; // a freshly remembered user should see their return card next time
  }
  function getRememberedUser() {
    try { var o = JSON.parse(localStorage.getItem(REMEMBER_KEY)); return (o && o.role) ? o : null; } catch (_) { return null; }
  }
  function clearRememberedUser() { try { localStorage.removeItem(REMEMBER_KEY); } catch (_) {} }
  GA.rememberUser = rememberUser; GA.getRememberedUser = getRememberedUser; GA.clearRememberedUser = clearRememberedUser;

  GA._dismissReturnCard = function () { GA._dismissReturn = true; render(); };
  GA.continueRememberedUser = async function () {

      if (GA.cloud.enabled()) {
        var sess = await GA.cloud.getSession();
        if (!sess && GA.cloud.online()) {  // session gone and server reachable -> fresh login
          clearRememberedUser(); GA._authTab = "login"; GA.go("#access-teacher"); return;
        }
      }
      if (u.displayName) applyTeacherProfile({ name: u.displayName, school: u.school });

    } else {

  /* ====================================================================
     CLOUD ADAPTER  (the one seam that talks to Supabase)
     Teachers ride Supabase Auth (browser session). Students never get a
     session — every push/pull re-validates a teacher-issued (username,
     code) server-side, so there is no student uid to mismatch. The
     student's code lives in memory ONLY (never localStorage).

     Contract used by the auth handlers below:
       method returns null          -> cloud not configured -> use local logic
       method returns {ok:true,...} -> success
       method returns {ok:false,..} -> server reachable but rejected / offline
     ==================================================================== */
  GA.cloud = (function () {
    var cfg = (GA.cloudConfig || {});
    var client = null, ready = false, tried = false;
    var stu = { username: null, code: null };   // in-memory student secret
    var queue = [];                               // pending progress pushes

    function init() {
      if (tried) return ready;
      tried = true;
      if (!cfg.url || !cfg.key || !window.supabase || !window.supabase.createClient) { ready = false; return false; }
      try {
        client = window.supabase.createClient(cfg.url, cfg.key, {
          auth: { persistSession: true, autoRefreshToken: true, storageKey: "mm_grammar_sb_auth" }
        });
        ready = true;
      } catch (_) { ready = false; }
      return ready;
    }
    function online() { return ready && (typeof navigator === "undefined" || navigator.onLine !== false); }
    function offlineErr() { return { ok: false, error: "Can't reach the server right now — please check your connection and try again." }; }

    return {
      enabled: function () { return init(); },
      online: online,

      /* ---- teacher auth (Supabase Auth) ---- */
      teacherSignUp: async function (email, password, meta) {
        if (!init()) return null;
        try {
          var r = await client.auth.signUp({ email: email, password: password, options: { data: meta || {} } });
          if (r.error) return { ok: false, error: r.error.message };
          var hasSession = !!(r.data && r.data.session);
          return { ok: true, profile: meta || {}, needsConfirm: !hasSession };
        } catch (_) { return offlineErr(); }
      },
      teacherSignIn: async function (email, password) {
        if (!init()) return null;
        try {
          var r = await client.auth.signInWithPassword({ email: email, password: password });
          if (r.error) return { ok: false, error: r.error.message };
          var prof = null;
          try {
            var pr = await client.from("teachers").select("name,school,emirate").eq("id", r.data.user.id).single();
            if (!pr.error) prof = pr.data;
          } catch (_) {}
          return { ok: true, profile: prof || {} };
        } catch (_) { return offlineErr(); }
      },
      teacherSignOut: async function () { if (init()) { try { await client.auth.signOut(); } catch (_) {} } },
      getSession: async function () {
        if (!init()) return null;
        try { var r = await client.auth.getSession(); return (r && r.data && r.data.session) ? r.data.session : null; }
        catch (_) { return null; }
      },
      forgotPassword: async function (email) {
        if (!init()) return null;
        try { await client.auth.resetPasswordForEmail(email); } catch (_) {}
        return { ok: true, message: "If an account exists for this email, a reset link will be sent. Please check your inbox and spam or junk folder." };
      },

      /* ---- student RPCs (code re-validated each call) ---- */
      setStudent: function (username, code) { stu.username = username || null; stu.code = code || null; },
      clearStudent: function () { stu.username = null; stu.code = null; queue = []; },
      studentLogin: async function (username, code) {
        if (!init()) return null;
        try {
          var r = await client.rpc("student_login", { p_username: username, p_code: code });
          if (r.error) return { ok: false, error: "Login not recognised." };
          return r.data;
        } catch (_) { return offlineErr(); }
      },
      studentPull: async function () {
        if (!init() || !stu.username) return null;
        try {
          var r = await client.rpc("student_pull_progress", { p_username: stu.username, p_code: stu.code });
          if (r.error) return null;
          return r.data;
        } catch (_) { return null; }
      },
      queueProgress: function (term, lid, practice, official) {
        queue.push({ term: term, lesson_id: lid, practice: practice || null, official: official || null, updated_at: new Date().toISOString() });
        this.flush();
      },
      flush: async function () {
        if (!init() || !stu.username || !online() || !queue.length) return;
        var batch = queue.slice();
        try {
          var r = await client.rpc("student_push_progress_batch", { p_username: stu.username, p_code: stu.code, p_items: batch });
          if (r && !r.error && r.data && r.data.ok) {
            queue = queue.filter(function (x) { return batch.indexOf(x) === -1; });  // drop exactly the flushed items
          }
        } catch (_) { /* keep queue for retry */ }
      },

      /* ---- teacher roster (code hashed server-side) ---- */
      teacherUpsertStudent: async function (username, number, code) {
        if (!init()) return null;
        try {
          var r = await client.rpc("teacher_upsert_student", { p_username: username, p_student_number: number, p_code: code });
          if (r.error) return { ok: false, error: r.error.message };
          return r.data;
        } catch (_) { return offlineErr(); }
      }
    };
  })();

  // Pull cloud progress for the current student and merge into local store
  // (last-write-wins at the lesson-cell level). No-op when cloud is off.
  GA._pullCloudProgress = async function () {
    if (!GA.cloud.enabled() || !session.num) return;
    var res = await GA.cloud.studentPull();
    if (!res || !res.ok || !Array.isArray(res.rows)) return;
    var num = session.num;
    res.rows.forEach(function (row) {
      var lp = lessonProgress(num, row.term, row.lesson_id);
      var localT = Math.max(
        (lp.rec.practice && lp.rec.practice.lastAt) || 0,
        (lp.rec.official && lp.rec.official.at) || 0
      );
      var cloudT = Date.parse(row.updated_at) || 0;
      if (cloudT > localT) {
        if (row.practice) lp.rec.practice = row.practice;
        if (row.official) lp.rec.official = row.official;
        store.save(lp.d);
      }
    });
  };

  // Retry any queued pushes when connectivity returns.
  if (typeof window !== "undefined" && window.addEventListener) {
    window.addEventListener("online", function () { try { GA.cloud.flush(); } catch (_) {} });
  }

  /* ---------- auth stubs (local/demo logic; used when cloud is off) --- */
  GA.auth = (function () {
    var TKEY = "mm_grammar_teacher_accounts", SKEY = "mm_grammar_student_accounts";
    function read(k) { try { var o = JSON.parse(localStorage.getItem(k)); return (o && typeof o === "object") ? o : {}; } catch (_) { return {}; } }
    function write(k, o) { try { localStorage.setItem(k, JSON.stringify(o)); } catch (_) {} }
    // simple non-cryptographic hash — placeholder ONLY (never store plain passwords; replace when cloud-wired)
    function hash(s) { var h = 5381, i = String(s).length; while (i) { h = (h * 33) ^ String(s).charCodeAt(--i); } return (h >>> 0).toString(16); }
    var EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
    return {
      emailValid: function (e) { return EMAIL_RE.test(String(e || "").trim()); },
      // handleStudentLogin(username, code) → {ok, num} | {ok:false, error}
      handleStudentLogin: function (username, code) {
        username = String(username || "").trim();
        if (!username) return { ok: false, error: "Please enter your username." };
        if (!String(code || "").trim()) return { ok: false, error: "Please enter your code." };
        var a = read(SKEY)[username];
        if (a) {
          if (String(a.code) !== String(code).trim()) return { ok: false, error: "That code does not match this username." };
          return { ok: true, num: a.num || username };
        }
        // TODO(backend): verify teacher-issued username/code. Demo: accept and use username as identity.
        return { ok: true, num: username };
      },
      // handleTeacherSignup(profile) → {ok, profile} | {ok:false, error}
      handleTeacherSignup: function (p) {
        var t = read(TKEY), email = String(p.email || "").trim().toLowerCase();
        if (t[email]) return { ok: false, error: "An account already exists for this email. Try logging in instead." };
        t[email] = { name: p.name, email: email, school: p.school, emirate: p.emirate, pass: hash(p.password), at: Date.now() };
        write(TKEY, t);
        return { ok: true, profile: t[email] };
      },
      // handleTeacherLogin(email, password) → {ok, profile} | {ok:false, error}
      handleTeacherLogin: function (email, password) {
        var key = String(email || "").trim().toLowerCase(), a = read(TKEY)[key];
        if (a) {
          if (a.pass !== hash(password)) return { ok: false, error: "Incorrect email or password." };
          return { ok: true, profile: a };
        }
        // dev fallback: legacy access code accepted as the password
        if (String(password) === TEACHER_ACCESS_CODE) return { ok: true, profile: null, legacy: true };
        return { ok: false, error: "No account found for that email. Create a teacher account, or use your access code as the password." };
      },
      // handleForgotPassword(email) → {ok, message} | {ok:false, error}
      handleForgotPassword: function (email) {
        email = String(email || "").trim();
        if (!email) return { ok: false, error: "Please enter your email first." };
        if (!EMAIL_RE.test(email)) return { ok: false, error: "Please enter a valid email address." };
        // TODO(backend): trigger the real reset-email send here.
        return { ok: true, message: "If an account exists for this email, a reset link will be sent. Please check your inbox and spam or junk folder." };
      }
    };
  })();
  // top-level stub aliases (per spec naming)
  function handleStudentLogin(u, c) { return GA.auth.handleStudentLogin(u, c); }
  function handleTeacherLogin(e, p) { return GA.auth.handleTeacherLogin(e, p); }
  function handleTeacherSignup(p) { return GA.auth.handleTeacherSignup(p); }
  function handleForgotPassword(e) { return GA.auth.handleForgotPassword(e); }

  function applyTeacherProfile(p) {
    if (!p || !p.name) return;
    var s = {}; try { s = JSON.parse(localStorage.getItem("mm_grammar_report_signature")) || {}; } catch (_) {}
    s.name = p.name; if (p.school) s.school = p.school; if (!s.title) s.title = "English Teacher";

  function setAuthErr(id, msg, info) { var e = el(id); if (!e) return; e.textContent = msg || ""; e.className = "auth-error" + (info ? " info" : ""); }

  /* ---------- views: role selection + return card --------------------- */

  GA._studentLogin = async function () {

  GA._teacherSignup = async function () {

      email: (el("tsEmail") && el("tsEmail").value || "").trim(),
      school: (el("tsSchool") && el("tsSchool").value || "").trim(),

    };

    if (r == null) r = GA.auth.handleTeacherSignup(p);   // offline / unconfigured fallback

    prog: svgWrap('<path d="M4 18v-5m6 5V8m6 10v-8"/><path d="M3 21h18"/>'),

      { id: "path", label: "Pathway", icon: BB_ICONS.path, go: hasPick ? "#lessons" : "#home", on: h === "lessons" || h === "lesson" },

  /* ---------- boot ----------------------------------------------------- */
  // drain any modules queued before the engine installed the real register
  var queued = GA._queue || []; GA._queue = [];
  queued.forEach(function (m) { GA.register(m); });

  window.addEventListener("hashchange", render);
  render();
  console.log("[GA] engine ready · " + Object.keys(GA.registry.lessons).length + " lesson(s) across " +
    Object.keys(GA.registry.pathways).length + " pathway(s)");
})();
